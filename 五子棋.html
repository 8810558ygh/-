<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.5, user-scalable=yes">
  <title>东南大学 · 五子棋对弈</title>
  <link rel="stylesheet" href="style.css">
  <script src="goban.js"></script>
  <script src="rules.js"></script>
  <style>
    /* 仅对本页面微调：增大棋盘、下移布局 */
    .game-container-local {
      padding-top: 40px;          /* 整体下移 */
    }
    .board-wrap {
      max-width: 820px;           /* 适配更大的画布 */
    }
    /* 调整棋子示例大小（UI上的小圆点） */
    .piece-sample {
      width: 32px;
      height: 32px;
    }
  </style>
</head>
<body>

<div id="gameEndOverlay" class="game-end-overlay" onclick="closeGameEnd()">
  <div class="end-particles" id="endParticles"></div>
  <div class="game-end-text" id="gameEndText">⚫ 黑方获胜！</div>
  <div class="game-end-sub" id="gameEndSub">黑棋连珠，技高一筹</div>
</div>

<div class="game-container-local">
  <h1>⚫ 东南五子 · 弈 ⚪</h1>
  <div class="mode-tag" id="modeTag">🎋 业余模式</div>

  <div class="board-wrap">
    <canvas id="gobanCanvas" width="800" height="800"></canvas>
  </div>

  <div class="info-panel">
    <div class="turn-indicator" id="turnDisplay">
      <span>当前落子：</span>
      <span id="currentPieceIcon" class="piece-sample black"></span>
      <span id="turnText">黑棋</span>
    </div>
    <div class="buttons">
      <button class="btn" id="restartButton"><span>🔄</span> 新的一局</button>
      <button class="btn" id="undoButton"><span>↩️</span> 悔棋</button>
    </div>
    <div id="winnerBanner" class="winner-message"></div>
  </div>
  <div class="hint-text">点击棋盘交叉点落子 · 黑先白后</div>
  <div class="forbidden-hint" id="forbiddenHint">⚔️ 专业模式：黑棋存在三三禁手、四四禁手、长连禁手</div>
</div>

<script>
  (function() {
    const urlParams = new URLSearchParams(window.location.search);
    const gameMode = urlParams.get('mode') || 'casual';
    const isProMode = gameMode === 'pro';

    const modeTag = document.getElementById('modeTag');
    if (isProMode) {
      modeTag.innerText = '⚔️ 专业模式（黑棋禁手）';
      modeTag.classList.add('pro');
      document.getElementById('forbiddenHint').classList.add('show');
    }

    const BOARD_SIZE = 15;
    const CANVAS_SIZE = 800;          // 增大画布
    const MARGIN = 50;                // 增大边距
    const GRID_SIZE = CANVAS_SIZE - MARGIN * 2;
    const CELL_SIZE = GRID_SIZE / (BOARD_SIZE - 1);
    const stoneRadius = CELL_SIZE * 0.46;  // 棋子更大

    const canvas = document.getElementById('gobanCanvas');
    const ctx = canvas.getContext('2d');

    const turnText = document.getElementById('turnText');
    const currentPieceIcon = document.getElementById('currentPieceIcon');
    const winnerBanner = document.getElementById('winnerBanner');
    const turnDisplay = document.getElementById('turnDisplay');
    const restartBtn = document.getElementById('restartButton');
    const undoBtn = document.getElementById('undoButton');

    let board = [];
    let currentPlayer = 1;
    let gameOver = false;
    let winner = null;
    let moveHistory = [];
    let winLines = [];
    let forbiddenLines = [];

    function initBoard() {
      board = Rules.initBoard(BOARD_SIZE);
      currentPlayer = 1;
      gameOver = false;
      winner = null;
      moveHistory = [];
      winLines = [];
      forbiddenLines = [];
      updateTurnDisplay();
      winnerBanner.textContent = '';
      drawBoard();
    }

    function updateTurnDisplay() {
      turnDisplay.classList.remove('active-black', 'active-white');
      if (gameOver) {
        if (winner === 1) {
          turnText.textContent = '黑方胜';
          currentPieceIcon.className = 'piece-sample black';
          turnDisplay.classList.add('active-black');
        } else if (winner === 2) {
          turnText.textContent = '白方胜';
          currentPieceIcon.className = 'piece-sample white';
          turnDisplay.classList.add('active-white');
        } else {
          turnText.textContent = '平局';
          currentPieceIcon.className = 'piece-sample';
        }
        return;
      }
      if (currentPlayer === 1) {
        turnText.textContent = '黑棋';
        currentPieceIcon.className = 'piece-sample black';
        turnDisplay.classList.add('active-black');
      } else {
        turnText.textContent = '白棋';
        currentPieceIcon.className = 'piece-sample white';
        turnDisplay.classList.add('active-white');
      }
    }

    // ---------- 绘制（使用 Goban） ----------
    function drawBoard(drawLastMark) {
      if (drawLastMark === undefined) drawLastMark = !isProMode;
      const lastMove = moveHistory.length > 0 ? moveHistory[moveHistory.length - 1] : null;
      Goban.drawBoard(ctx, board, {
        lastMove: lastMove,
        winLines: winLines,
        forbiddenLines: forbiddenLines,
        drawLastMark: drawLastMark,
        boardSize: BOARD_SIZE,
        margin: MARGIN,
        stoneRadius: stoneRadius
      });
    }

    function animateLines(lines, isForbidden, onComplete) {
      let startTime = null;
      let duration = 800;
      function frame(timestamp) {
        if (!startTime) startTime = timestamp;
        let elapsed = timestamp - startTime;
        let progress = Math.min(elapsed / duration, 1);
        let ease = 1 - Math.pow(1 - progress, 3);
        Goban.drawBoard(ctx, board, {
          lastMove: moveHistory.length > 0 ? moveHistory[moveHistory.length - 1] : null,
          winLines: [],
          forbiddenLines: [],
          drawLastMark: false,
          boardSize: BOARD_SIZE,
          margin: MARGIN,
          stoneRadius: stoneRadius
        });
        if (lines.length > 0) {
          Goban.drawLinesProgress(ctx, lines, ease, MARGIN, CELL_SIZE, '#d64531');
        }
        if (progress < 1) {
          requestAnimationFrame(frame);
        } else {
          setTimeout(onComplete, 300);
        }
      }
      requestAnimationFrame(frame);
    }

    // ---------- 游戏结束 ----------
    function endGame(winningPlayer, reason) {
      gameOver = true;
      winner = winningPlayer;
      updateTurnDisplay();

      if (reason === 'forbidden') {
        winnerBanner.textContent = '⛔ 黑棋禁手！白棋胜';
        animateLines(forbiddenLines, true, () => {
          showWinnerMsg('forbidden');
        });
        return;
      }

      if (winningPlayer === 1) {
        winnerBanner.textContent = '🏆 黑棋五连！胜局 🏆';
        animateLines(winLines, false, () => {
          showWinnerMsg('black');
        });
      } else if (winningPlayer === 2) {
        winnerBanner.textContent = '🏆 白棋五连！胜局 🏆';
        animateLines(winLines, false, () => {
          showWinnerMsg('white');
        });
      } else {
        winnerBanner.textContent = '🤝 棋盘已满 · 平局 🤝';
        showWinnerMsg('draw');
      }
    }

    function showWinnerMsg(type) {
      let msg, subMsg, className;
      if (type === 'black') {
        msg = '⚫ 黑方获胜！';
        subMsg = '黑棋连珠，技高一筹';
        className = 'end-black-win';
      } else if (type === 'white') {
        msg = '⚪ 白方获胜！';
        subMsg = '白棋连珠，技高一筹';
        className = 'end-white-win';
      } else if (type === 'draw') {
        msg = '🤝 平局！';
        subMsg = '旗鼓相当，不分胜负';
        className = 'end-draw';
      } else if (type === 'forbidden') {
        msg = '⛔ 黑棋禁手！';
        subMsg = '白棋不战而胜';
        className = 'end-forbidden';
      }

      let overlay = document.getElementById('gameEndOverlay');
      let text = document.getElementById('gameEndText');
      let sub = document.getElementById('gameEndSub');
      let particles = document.getElementById('endParticles');

      text.innerText = msg;
      text.className = 'game-end-text ' + className;
      sub.innerText = subMsg;

      particles.innerHTML = '';
      for (let i = 0; i < 20; i++) {
        let p = document.createElement('div');
        p.className = 'end-particle';
        p.style.left = Math.random() * 100 + '%';
        p.style.top = Math.random() * 100 + '%';
        p.style.animationDelay = Math.random() * 2 + 's';
        p.style.width = (3 + Math.random() * 6) + 'px';
        p.style.height = p.style.width;
        let colors = ['#e9bc6e', '#f5c542', '#e0816b', '#6c9fd1', '#c8aa77'];
        p.style.background = colors[Math.floor(Math.random() * colors.length)];
        particles.appendChild(p);
      }

      overlay.classList.add('show');
      setTimeout(() => {
        closeGameEnd();
      }, 3500);
    }

    function closeGameEnd() {
      document.getElementById('gameEndOverlay').classList.remove('show');
    }

    // ---------- 落子 ----------
    function placePiece(row, col) {
      if (gameOver) {
        alert('对局已结束，请开启新的一局。');
        return false;
      }
      if (row < 0 || row >= BOARD_SIZE || col < 0 || col >= BOARD_SIZE) return false;
      if (board[row][col] !== 0) {
        alert('此位置已有棋子，请选择空位。');
        return false;
      }

      if (isProMode && currentPlayer === 1) {
        board[row][col] = 1;
        let forbidden = Rules.checkForbidden(row, col, board, BOARD_SIZE);
        board[row][col] = 0;

        if (forbidden.sanSan || forbidden.siSi || forbidden.overline) {
          board[row][col] = 1;
          moveHistory.push({ row, col, player: 1 });
          forbiddenLines = forbidden.lines;
          drawBoard(false);
          endGame(2, 'forbidden');
          return true;
        }
      }

      board[row][col] = currentPlayer;
      moveHistory.push({ row, col, player: currentPlayer });

      let winLine = Rules.checkWinWithLine(row, col, currentPlayer, board, BOARD_SIZE);
      if (winLine) {
        winLines = [winLine];
        drawBoard(false);
        endGame(currentPlayer);
        return true;
      } else if (Rules.isBoardFull(board, BOARD_SIZE)) {
        drawBoard();
        endGame(0);
        return true;
      }

      currentPlayer = currentPlayer === 1 ? 2 : 1;
      updateTurnDisplay();
      drawBoard();
      return true;
    }

    // ---------- 悔棋 ----------
    function undoMove() {
      if (gameOver) {
        alert('对局已结束，无法悔棋。请重新开始。');
        return;
      }
      if (moveHistory.length === 0) {
        alert('没有棋子可以悔棋。');
        return;
      }
      const lastMove = moveHistory.pop();
      board[lastMove.row][lastMove.col] = 0;
      currentPlayer = lastMove.player;
      updateTurnDisplay();
      drawBoard();
    }

    // ---------- 事件绑定 ----------
    function handleCanvasClick(e) {
      if (gameOver) return;
      const rect = canvas.getBoundingClientRect();
      const scale = canvas.width / rect.width;
      const mx = (e.clientX - rect.left) * scale;
      const my = (e.clientY - rect.top) * scale;
      const col = Math.round((mx - MARGIN) / CELL_SIZE);
      const row = Math.round((my - MARGIN) / CELL_SIZE);
      if (row >= 0 && row < BOARD_SIZE && col >= 0 && col < BOARD_SIZE) {
        placePiece(row, col);
      }
    }

    canvas.addEventListener('click', handleCanvasClick);
    restartBtn.addEventListener('click', () => initBoard());
    undoBtn.addEventListener('click', () => undoMove());
    window.addEventListener('resize', () => drawBoard());

    initBoard();
  })();
</script>
</body>
</html>
