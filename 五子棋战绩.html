<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>东南五子 · 战绩</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.49.4/dist/umd/supabase.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Noto Serif SC', '楷体', 'KaiTi', serif; }
    body {
      background: #2b1e0f;
      background-image: radial-gradient(circle at 25% 40%, rgba(210, 160, 90, 0.08) 2%, transparent 2.5%);
      background-size: 48px 48px;
      min-height: 100vh;
      color: #ecd9b4;
    }

    .hidden { display: none !important; }
    .toast {
      position: fixed; bottom: 30px; left: 50%;
      transform: translateX(-50%) translateY(100px);
      background: rgba(30, 20, 10, 0.96);
      backdrop-filter: blur(8px);
      color: #f5c542;
      border: 1px solid rgba(245, 197, 66, 0.5);
      padding: 12px 28px; border-radius: 40px;
      font-size: 0.9rem; z-index: 10000;
      opacity: 0; transition: 0.3s; pointer-events: none; white-space: nowrap;
    }
    .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

    .top-bar {
      position: fixed; top: 0; left: 0; right: 0; height: 60px;
      background: rgba(25, 18, 10, 0.85); backdrop-filter: blur(12px);
      border-bottom: 1px solid rgba(230, 190, 110, 0.3);
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 28px; z-index: 100;
    }
    .logo { font-family: 'Orbitron', monospace; font-size: 1.2rem; font-weight: 700; color: #e9bc6e; letter-spacing: 2px; }
    .top-btn {
      background: rgba(200, 160, 100, 0.2); border: 1px solid #e9bc6e;
      border-radius: 40px; padding: 6px 16px; cursor: pointer; font-size: 0.85rem;
      color: #ecd9b4; transition: 0.2s;
    }
    .top-btn:hover { background: rgba(200, 160, 100, 0.35); }

    .container {
      padding: 90px 20px 40px;
      max-width: 900px;
      margin: 0 auto;
    }
    .page-title {
      font-size: 2.2rem; font-weight: 900; color: #ebc282;
      text-align: center; margin-bottom: 8px;
      text-shadow: 0 0 20px rgba(235, 194, 130, 0.3);
    }
    .page-subtitle {
      text-align: center; color: #a09070; font-size: 0.95rem; margin-bottom: 28px;
    }
    .empty-state {
      text-align: center; padding: 60px 20px; color: #a09070;
    }
    .empty-state div:first-child { font-size: 3rem; margin-bottom: 12px; }

    .record-list { display: flex; flex-direction: column; gap: 12px; }
    .record-card {
      background: rgba(35, 25, 15, 0.6); backdrop-filter: blur(4px);
      border-radius: 24px; padding: 18px 22px;
      border: 2px solid rgba(220, 180, 100, 0.25);
      cursor: pointer; transition: 0.2s;
      display: flex; align-items: center; justify-content: space-between;
      flex-wrap: wrap; gap: 10px;
    }
    .record-card:hover {
      border-color: #ebc282;
      transform: translateY(-2px);
      background: rgba(45, 33, 20, 0.7);
      box-shadow: 0 8px 20px rgba(0,0,0,0.3);
    }
    .record-left { display: flex; flex-direction: column; gap: 6px; flex: 1; min-width: 200px; }
    .record-players { font-size: 1.05rem; color: #ecd9b4; }
    .record-players .vs { color: #a09070; margin: 0 6px; }
    .record-winner { font-size: 0.9rem; font-weight: bold; }
    .record-winner.black { color: #e0816b; }
    .record-winner.white { color: #6c9fd1; }
    .record-winner.draw { color: #c8aa77; }
    .record-winner.forbidden { color: #e0816b; }
    .record-meta { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }
    .record-tag {
      font-size: 0.75rem; padding: 3px 10px; border-radius: 20px;
      background: rgba(245, 197, 66, 0.12); color: #f5c542;
      border: 1px solid rgba(245, 197, 66, 0.3);
    }
    .record-tag.pro {
      background: rgba(224, 129, 107, 0.12); color: #e0816b;
      border-color: rgba(224, 129, 107, 0.3);
    }
    .record-time { font-size: 0.8rem; color: #a09070; }
    .record-action {
      font-size: 0.85rem; color: #e9bc6e; font-weight: bold;
      white-space: nowrap;
    }

    /* 复盘弹窗 */
    .modal {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(0,0,0,0.85); backdrop-filter: blur(10px);
      z-index: 1000; display: flex; align-items: center; justify-content: center;
      visibility: hidden; opacity: 0; transition: 0.2s;
      padding: 20px;
    }
    .modal.show { visibility: visible; opacity: 1; }
    .modal-content {
      background: #2c2419; border-radius: 32px; padding: 24px;
      width: 100%; max-width: 760px; border: 2px solid #e9bc6e;
      display: flex; flex-direction: column; align-items: center;
      max-height: 95vh; overflow-y: auto;
    }
    .replay-header {
      width: 100%; display: flex; justify-content: space-between; align-items: center;
      margin-bottom: 16px; padding-bottom: 12px; border-bottom: 1px solid #5e4a31;
    }
    .replay-header h3 { color: #e9bc6e; font-size: 1.3rem; }
    .replay-header button {
      background: transparent; border: 1px solid #bd9a60; color: #bd9a60;
      border-radius: 50%; width: 36px; height: 36px; cursor: pointer; font-size: 1.1rem;
    }
    .replay-board-wrap {
      background: #e1c394; padding: 12px; border-radius: 20px;
      box-shadow: 0 12px 25px rgba(0,0,0,0.5); width: 100%; max-width: 600px;
    }
    #replayCanvas {
      display: block; border-radius: 12px; background: #eedbbc;
      width: 100%; height: auto;
    }
    .replay-controls {
      display: flex; gap: 10px; justify-content: center; flex-wrap: wrap;
      margin-top: 16px; width: 100%;
    }
    .ctrl-btn {
      background: linear-gradient(145deg, #c89d60, #8f6a30); border: none;
      border-radius: 30px; padding: 8px 18px; font-weight: bold;
      cursor: pointer; color: #1e160c; font-size: 0.9rem; transition: 0.15s;
    }
    .ctrl-btn:hover { filter: brightness(1.1); }
    .ctrl-btn.secondary {
      background: transparent; border: 1px solid #bd9a60; color: #bd9a60;
    }
    .ctrl-btn.secondary:hover { background: rgba(189, 154, 96, 0.15); }
    .ctrl-btn.active-speed {
      background: #f5c542; border-color: #f5c542; color: #1e160c;
    }
    .replay-info {
      margin-top: 12px; color: #a09070; font-size: 0.9rem; text-align: center;
    }
    .replay-progress {
      width: 100%; max-width: 600px; margin-top: 12px;
      display: flex; align-items: center; gap: 10px;
    }
    .replay-progress span { font-size: 0.8rem; color: #a09070; min-width: 40px; text-align: center; }
    .progress-bar {
      flex: 1; height: 6px; background: #3e2e1d; border-radius: 3px; overflow: hidden;
    }
    .progress-fill {
      height: 100%; background: linear-gradient(90deg, #e9bc6e, #f5c542);
      border-radius: 3px; transition: width 0.3s ease; width: 0%;
    }

    @media (max-width: 768px) {
      .top-bar { height: 50px; padding: 0 12px; }
      .logo { font-size: 0.9rem; letter-spacing: 1px; }
      .top-btn { padding: 4px 10px; font-size: 0.75rem; }
      .container { padding: 70px 12px 30px; }
      .page-title { font-size: 1.6rem; }
      .record-card { padding: 14px 16px; border-radius: 18px; }
      .record-players { font-size: 0.95rem; }
      .modal-content { padding: 16px; border-radius: 24px; }
      .replay-header h3 { font-size: 1.1rem; }
      .replay-board-wrap { padding: 8px; border-radius: 14px; }
      .ctrl-btn { padding: 6px 12px; font-size: 0.8rem; }
    }
  </style>
<base target="_blank">
<base target="_blank">
</head>
<body>

<div id="toast" class="toast"></div>

<div class="top-bar">
  <div class="logo">⚫ 东南五子·战绩 ⚪</div>
  <button class="top-btn" onclick="backToHall()">🔙 返回大厅</button>
</div>

<div class="container">
  <div class="page-title">📊 我的战绩</div>
  <div class="page-subtitle" id="subtitle">加载中...</div>
  <div id="recordsList">
    <div class="empty-state">
      <div>⏳</div>
      <div>正在加载战绩...</div>
    </div>
  </div>
</div>

<!-- 复盘弹窗 -->
<div id="replayModal" class="modal">
  <div class="modal-content">
    <div class="replay-header">
      <h3 id="replayTitle">♟️ 复盘</h3>
      <button onclick="closeReplay()">✕</button>
    </div>
    <div class="replay-board-wrap">
      <canvas id="replayCanvas" width="600" height="600"></canvas>
    </div>
    <div class="replay-progress">
      <span id="stepCurrent">0</span>
      <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
      <span id="stepTotal">0</span>
    </div>
    <div class="replay-controls">
      <button class="ctrl-btn" id="pauseBtn" onclick="togglePause()">⏸️ 暂停</button>
      <button class="ctrl-btn secondary" onclick="resetReplay()">⏮️ 重置</button>
      <button class="ctrl-btn secondary" id="speed05" onclick="setSpeed(0.5)">0.5x</button>
      <button class="ctrl-btn secondary active-speed" id="speed1" onclick="setSpeed(1)">1x</button>
      <button class="ctrl-btn secondary" id="speed2" onclick="setSpeed(2)">2x</button>
    </div>
    <div class="replay-info" id="replayInfo">点击开始复盘</div>
  </div>
</div>

<script>
  const SUPABASE_URL = 'https://txgemtxikpieaqcohglr.supabase.co';
  const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InR4Z2VtdHhpa3BpZWFxY29oZ2xyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk4MDY1NTIsImV4cCI6MjA5NTM4MjU1Mn0.I0PHUfWmiDpBnfjmTBJ1u6ybzZzhsTG0uaLbKBrcN1c';

  const BOARD_SIZE = 15;
  const CANVAS_SIZE = 600;
  const MARGIN = 36;
  const GRID_SIZE = CANVAS_SIZE - MARGIN * 2;
  const CELL_SIZE = GRID_SIZE / (BOARD_SIZE - 1);
  const stoneRadius = CELL_SIZE * 0.42;

  let supabase = null;
  let currentUser = null;
  let myNick = localStorage.getItem('gonick') || '游客';
  let guestId = localStorage.getItem('guest_id');

  let allRecords = [];

  // 复盘状态
  let replayMoves = [];
  let replayStep = 0;
  let replayTimer = null;
  let replaySpeed = 1;
  let isPaused = false;
  let replayBoard = [];
  let rCanvas = null;
  let rCtx = null;
  const BASE_INTERVAL = 700;

  async function init() {
    if (!window.supabase) { showToast('Supabase 库加载失败'); return; }
    supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    const { data: { session } } = await supabase.auth.getSession();
    if (session) currentUser = session.user;

    // 游客必须保证有ID
    if (!guestId) {
      guestId = 'guest_' + Date.now() + '_' + Math.random().toString(36).substr(2, 6);
      localStorage.setItem('guest_id', guestId);
    }

    // 先清理3天前的记录
    await cleanupOldRecords();
    // 再加载战绩
    await loadRecords();
  }

  async function cleanupOldRecords() {
    const threeDaysAgo = new Date(Date.now() - 3 * 24 * 60 * 60 * 1000).toISOString();
    let query = supabase.from('games').delete().lt('created_at', threeDaysAgo);
    if (currentUser) {
      query = query.or('user_id.eq.' + currentUser.id + ',guest_id.eq.' + currentUser.id);
    } else {
      query = query.or('guest_id.eq.' + guestId + ',user_id.eq.' + guestId);
    }
    await query;
  }

  async function loadRecords() {
    const threeDaysAgo = new Date(Date.now() - 3 * 24 * 60 * 60 * 1000).toISOString();
    let query = supabase.from('games')
      .select('*')
      .gte('created_at', threeDaysAgo)
      .order('created_at', { ascending: false });

    if (currentUser) {
      query = query.or('user_id.eq.' + currentUser.id + ',guest_id.eq.' + currentUser.id);
    } else {
      query = query.or('guest_id.eq.' + guestId + ',user_id.eq.' + guestId);
    }

    const { data, error } = await query;
    if (error) {
      showToast('加载战绩失败: ' + error.message);
      document.getElementById('subtitle').innerText = '加载失败，请刷新重试';
      return;
    }

    allRecords = data || [];
    renderList();
  }

  function renderList() {
    const container = document.getElementById('recordsList');
    const subtitle = document.getElementById('subtitle');

    if (allRecords.length === 0) {
      subtitle.innerText = '最近三天暂无对局记录';
      container.innerHTML = `
        <div class="empty-state">
          <div>📭</div>
          <div>暂无战绩</div>
          <div style="font-size:0.85rem;margin-top:6px;">快去下一局吧！</div>
        </div>`;
      return;
    }

    subtitle.innerText = '最近三天共 ' + allRecords.length + ' 局对局';
    let html = '<div class="record-list">';
    for (let i = 0; i < allRecords.length; i++) {
      let g = allRecords[i];
      let date = new Date(g.created_at);
      let timeStr = date.getMonth() + 1 + '月' + date.getDate() + '日 ' +
        String(date.getHours()).padStart(2, '0') + ':' +
        String(date.getMinutes()).padStart(2, '0');

      let winnerClass = g.winner;
      let winnerText = '';
      if (g.winner === 'black') winnerText = '⚫ 黑胜';
      else if (g.winner === 'white') winnerText = '⚪ 白胜';
      else if (g.winner === 'draw') winnerText = '🤝 平局';
      else if (g.winner === 'forbidden') winnerText = '⛔ 禁手判负';

      let modeTag = g.game_mode === 'pro' ? '<span class="record-tag pro">⚔️ 专业</span>' : '<span class="record-tag">🎋 业余</span>';

      html += `
        <div class="record-card" onclick="openReplay(${i})">
          <div class="record-left">
            <div class="record-players">
              <span style="color:#e0816b">⚫ ${escapeHtml(g.black_player)}</span>
              <span class="vs">vs</span>
              <span style="color:#6c9fd1">⚪ ${escapeHtml(g.white_player)}</span>
            </div>
            <div class="record-meta">
              <span class="record-winner ${winnerClass}">${winnerText}</span>
              ${modeTag}
              <span class="record-time">${timeStr}</span>
            </div>
          </div>
          <div class="record-action">▶ 复盘</div>
        </div>`;
    }
    html += '</div>';
    container.innerHTML = html;
  }

  function escapeHtml(text) {
    let div = document.createElement('div');
    div.innerText = text;
    return div.innerHTML;
  }

  // ========== 复盘 ==========
  function openReplay(index) {
    let g = allRecords[index];
    if (!g || !g.moves || g.moves.length === 0) { showToast('该局无落子记录'); return; }

    replayMoves = g.moves;
    replayStep = 0;
    replaySpeed = 1;
    isPaused = false;
    initReplayBoard();

    document.getElementById('replayTitle').innerText = '♟️ 复盘 · ' + g.black_player + ' vs ' + g.white_player;
    document.getElementById('stepTotal').innerText = replayMoves.length;
    document.getElementById('stepCurrent').innerText = '0';
    document.getElementById('progressFill').style.width = '0%';
    document.getElementById('replayInfo').innerText = '黑棋: ' + g.black_player + '　白棋: ' + g.white_player;
    document.getElementById('pauseBtn').innerText = '⏸️ 暂停';
    updateSpeedButtons();

    document.getElementById('replayModal').classList.add('show');

    rCanvas = document.getElementById('replayCanvas');
    rCtx = rCanvas.getContext('2d');
    drawReplayBoard();

    // 延迟一点开始，让用户先看到空棋盘
    setTimeout(() => replayNext(), 400);
  }

  function closeReplay() {
    clearTimeout(replayTimer);
    document.getElementById('replayModal').classList.remove('show');
  }

  function initReplayBoard() {
    replayBoard = Array(BOARD_SIZE).fill().map(() => Array(BOARD_SIZE).fill(0));
  }

  function replayNext() {
    if (replayStep >= replayMoves.length) return;
    if (isPaused) return;

    let m = replayMoves[replayStep];
    replayBoard[m.row][m.col] = m.player;
    replayStep++;
    drawReplayBoard();

    document.getElementById('stepCurrent').innerText = replayStep;
    let pct = (replayStep / replayMoves.length) * 100;
    document.getElementById('progressFill').style.width = pct + '%';

    if (replayStep < replayMoves.length) {
      replayTimer = setTimeout(replayNext, BASE_INTERVAL / replaySpeed);
    } else {
      document.getElementById('pauseBtn').innerText = '🔁 已结束';
    }
  }

  function togglePause() {
    if (replayStep >= replayMoves.length) {
      // 已结束，重置
      resetReplay();
      return;
    }
    isPaused = !isPaused;
    document.getElementById('pauseBtn').innerText = isPaused ? '▶️ 继续' : '⏸️ 暂停';
    if (!isPaused) replayNext();
  }

  function resetReplay() {
    clearTimeout(replayTimer);
    replayStep = 0;
    isPaused = false;
    initReplayBoard();
    drawReplayBoard();
    document.getElementById('stepCurrent').innerText = '0';
    document.getElementById('progressFill').style.width = '0%';
    document.getElementById('pauseBtn').innerText = '⏸️ 暂停';
    setTimeout(() => replayNext(), 300);
  }

  function setSpeed(s) {
    replaySpeed = s;
    updateSpeedButtons();
    showToast('播放速度: ' + s + 'x');
  }

  function updateSpeedButtons() {
    document.getElementById('speed05').classList.toggle('active-speed', replaySpeed === 0.5);
    document.getElementById('speed1').classList.toggle('active-speed', replaySpeed === 1);
    document.getElementById('speed2').classList.toggle('active-speed', replaySpeed === 2);
  }

  // ========== 绘制 ==========
  function drawReplayBoard() {
    if (!rCtx) return;
    rCtx.clearRect(0, 0, CANVAS_SIZE, CANVAS_SIZE);
    rCtx.fillStyle = '#eedbbc'; rCtx.fillRect(0, 0, CANVAS_SIZE, CANVAS_SIZE);

    rCtx.strokeStyle = '#5c3a1e'; rCtx.lineWidth = 2;
    rCtx.strokeRect(MARGIN - 2, MARGIN - 2, GRID_SIZE + 4, GRID_SIZE + 4);

    rCtx.strokeStyle = '#6b4c2c'; rCtx.lineWidth = 1.5;
    for (let i = 0; i < BOARD_SIZE; i++) {
      let pos = MARGIN + i * CELL_SIZE;
      rCtx.beginPath(); rCtx.moveTo(MARGIN, pos); rCtx.lineTo(MARGIN + GRID_SIZE, pos); rCtx.stroke();
      rCtx.beginPath(); rCtx.moveTo(pos, MARGIN); rCtx.lineTo(pos, MARGIN + GRID_SIZE); rCtx.stroke();
    }

    let stars = [[3,3],[3,7],[3,11],[7,3],[7,7],[7,11],[11,3],[11,7],[11,11]];
    rCtx.fillStyle = '#4a3a28';
    for (let [r, c] of stars) {
      let x = MARGIN + c * CELL_SIZE, y = MARGIN + r * CELL_SIZE;
      rCtx.beginPath(); rCtx.arc(x, y, 3.5, 0, Math.PI * 2); rCtx.fill();
    }

    for (let r = 0; r < BOARD_SIZE; r++) {
      for (let c = 0; c < BOARD_SIZE; c++) {
        if (replayBoard[r][c] === 0) continue;
        let x = MARGIN + c * CELL_SIZE, y = MARGIN + r * CELL_SIZE;
        drawReplayStone(x, y, replayBoard[r][c]);
      }
    }

    // 最后一步标记
    if (replayStep > 0 && replayStep <= replayMoves.length) {
      let last = replayMoves[replayStep - 1];
      let x = MARGIN + last.col * CELL_SIZE;
      let y = MARGIN + last.row * CELL_SIZE;
      rCtx.strokeStyle = '#d64531'; rCtx.lineWidth = 2.2;
      rCtx.beginPath();
      rCtx.rect(x - stoneRadius - 2, y - stoneRadius - 2, (stoneRadius + 2) * 2, (stoneRadius + 2) * 2);
      rCtx.stroke();
    }
  }

  function drawReplayStone(x, y, player) {
    rCtx.beginPath(); rCtx.arc(x + 2, y + 2, stoneRadius, 0, Math.PI * 2);
    rCtx.fillStyle = 'rgba(0,0,0,0.25)'; rCtx.fill();

    let grad = rCtx.createRadialGradient(x - stoneRadius * 0.3, y - stoneRadius * 0.3, stoneRadius * 0.1, x, y, stoneRadius);
    if (player === 1) {
      grad.addColorStop(0, '#6d5a4a'); grad.addColorStop(0.3, '#3d2e1f'); grad.addColorStop(1, '#1a120a');
    } else {
      grad.addColorStop(0, '#ffffff'); grad.addColorStop(0.3, '#f0e6d3'); grad.addColorStop(1, '#c8bca6');
    }
    rCtx.beginPath(); rCtx.arc(x, y, stoneRadius, 0, Math.PI * 2);
    rCtx.fillStyle = grad; rCtx.fill();

    rCtx.beginPath();
    rCtx.arc(x - stoneRadius * 0.25, y - stoneRadius * 0.25, stoneRadius * 0.35, 0, Math.PI * 2);
    rCtx.fillStyle = player === 1 ? 'rgba(255,255,255,0.08)' : 'rgba(255,255,255,0.6)';
    rCtx.fill();
  }

  function backToHall() {
    window.location.href = 'index.html';
  }

  function showToast(msg) {
    let t = document.getElementById('toast');
    t.innerText = msg; t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 2500);
  }

  document.getElementById('replayModal').addEventListener('click', (e) => {
    if (e.target.id === 'replayModal') closeReplay();
  });

  init();
</script>
</body>
</html>
