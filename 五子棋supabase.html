<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>东南五子 · 云端对弈</title>
  <link rel="stylesheet" href="style.css">
  <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
  <script src="goban.js"></script>
  <script src="rules.js"></script>
  <script src="online-ui.js"></script>
  <script src="online-core.js"></script>
  <script src="online-supabase.js"></script>
  <script src="audio.js"></script>
  <!-- 音乐播放器 -->
  <link rel="stylesheet" href="music-player.css">
  <script src="music-player.js"></script>
  <base target="_blank">
  <style>
    #gameScreen { padding-top: 80px; }
    .board-wrap { max-width: 820px; }
    .turn-reminder { font-size: 2.0rem; padding: 12px 24px; }
    .game-btn.secondary { margin-top: 15px; background: transparent; border: 1px solid #bd9a60; color: #bd9a60; padding: 8px 20px; border-radius: 30px; cursor: pointer; }
    .top-btn {
      background: rgba(200, 160, 100, 0.2);
      border: 1px solid #e9bc6e;
      border-radius: 40px;
      padding: 4px 12px;
      cursor: pointer;
      font-size: 0.8rem;
      color: #ecd9b4;
      transition: 0.2s;
      white-space: nowrap;
    }
    .top-btn:hover {
      background: rgba(200, 160, 100, 0.35);
    }
  </style>
</head>
<body>

<div id="toast" class="toast"></div>
<div class="top-bar">
  <div class="logo">⚫ 东南五子·弈 ⚪</div>
  <div class="top-right">
    <div class="personal-btn" id="personalCenterBtn">🧑 个人中心</div>
    <div class="conn-status"><span class="conn-dot conn-connecting" id="statusDot"></span><span id="statusText">未连接</span></div>
    <div class="room-code-badge" id="roomCodeDisplay" onclick="copyRoomCode()">----</div>
    <button class="top-btn" onclick="goToHall()">🏠 大厅</button>
  </div>
</div>

<div id="entryScreen">
  <div class="entry-card">
    <div class="entry-title">⚫ 五子棋 · 云端对弈 ⚪</div>
    <div class="user-info-display" id="userInfoDisplay">
      <div class="nick">👤 <span id="displayNickname">游客</span></div>
      <div class="email" id="displayEmailArea"></div>
    </div>
    <div class="entry-buttons">
      <button class="entry-btn" id="createRoomBtn">🏮 创建房间</button>
      <button class="entry-btn" id="showJoinBtn">🎋 加入房间</button>
    </div>
    <div id="joinRoomPanel" style="display: none;" class="join-input-area">
      <input type="text" id="joinRoomCodeInput" placeholder="房间代码" maxlength="8" autocomplete="off">
      <button class="entry-btn" id="confirmJoinBtn">进入</button>
    </div>
  </div>
</div>

<div id="lobbyScreen" class="hidden">
  <div class="lobby-mode-bar" id="lobbyModeBar">🎮 当前模式：业余模式</div>
  <div class="lobby-layout">
    <div class="lobby-column col-black">
      <div class="lobby-column-header">⚫ 黑棋方</div>
      <div class="seat-card" id="seatBlackCard" onclick="requestSeat('black')">
        <div class="seat-avatar empty-avatar" id="blackAvatar">+</div>
        <div class="seat-name" id="blackName">空位</div>
        <div class="seat-status" id="blackStatus">点击入座</div>
      </div>
    </div>
    <div class="lobby-column col-white">
      <div class="lobby-column-header">⚪ 白棋方</div>
      <div class="seat-card" id="seatWhiteCard" onclick="requestSeat('white')">
        <div class="seat-avatar empty-avatar" id="whiteAvatar">+</div>
        <div class="seat-name" id="whiteName">空位</div>
        <div class="seat-status" id="whiteStatus">点击入座</div>
      </div>
    </div>
    <div class="lobby-column col-spec">
      <div class="lobby-column-header">👁 观战席</div>
      <div id="specSeatsContainer"></div>
    </div>
  </div>
  <button class="start-game-btn" id="startGameButton" onclick="requestStartGame()">▶ 开始对弈</button>
  <button class="game-btn secondary" onclick="leaveRoom()" style="margin-top:15px;">🚪 退出房间</button>
  <div class="lobby-hint" style="margin-top: 20px; color:#c8aa77;">✨ 点击空位换座，有人则不能换</div>
</div>

<div id="gameScreen" class="hidden">
  <div class="game-container-online">
    <div class="board-panel">
      <div class="board-wrap">
        <div id="turnReminder" class="turn-reminder">⏳ 等待对局开始...</div>
        <canvas id="gobanCanvas" width="800" height="800"></canvas>
        <div style="display: flex; justify-content: center; gap: 15px; margin-top: 15px;">
          <button class="game-btn" id="btnSurrender" onclick="sendSurrender()">🏳️ 投降</button>
          <button class="game-btn" id="btnDraw" onclick="sendDrawRequest()">🤝 平局</button>
        </div>
      </div>
    </div>
    <div class="chat-panel">
      <div class="game-info">
        <div>🏠 房间: <span id="gameRoomCode">----</span></div>
        <div>🎴 你的身份: <span id="myRoleDisplay">观战</span> · <span id="gameStatus">未开始</span></div>
        <div>🎮 游戏模式: <span id="gameModeDisplay">业余模式</span></div>
        <div class="mini-players">
          <div class="mini-card" id="miniBlack"><div>⚫ 黑棋</div><div id="blackPlayerName">空位</div></div>
          <div class="mini-card" id="miniWhite"><div>⚪ 白棋</div><div id="whitePlayerName">空位</div></div>
        </div>
        <div class="turn-indicator" id="turnIndicator">⚫ 黑棋回合</div>
        <div id="winnerMessage"></div>
      </div>
      <div class="chat-messages" id="chatMessagesArea"><div class="chat-msg system">🎋 欢迎来到棋室，落子无悔</div></div>
      <div class="chat-input-area">
        <input type="text" id="chatMsgInput" placeholder="说点什么..." maxlength="200" onkeypress="if(event.key==='Enter') sendChatMsg()">
        <button class="game-btn" onclick="sendChatMsg()">传讯</button>
      </div>
    </div>
  </div>
</div>

<div id="gameEndOverlay" class="game-end-overlay" onclick="exitToLobby()">
  <div class="end-particles" id="endParticles"></div>
  <div class="game-end-text" id="gameEndText">⚫ 黑方获胜！</div>
  <div class="game-end-sub" id="gameEndSub">黑棋连珠，技高一筹</div>
</div>

<script>
  // ========== 音频触发标志 ==========
  let musicStarted = false;

  // ==================== 配置与用户信息 ====================
  const urlParams = new URLSearchParams(window.location.search);
  let gameMode = urlParams.get('mode') || 'casual';
  let isProMode = gameMode === 'pro';
  let roomGameMode = gameMode;

  let urlNick = urlParams.get('nickname');
  let urlEmail = urlParams.get('email');
  let myNick = localStorage.getItem('gonick');
  if (urlNick) { myNick = decodeURIComponent(urlNick); localStorage.setItem('gonick', myNick); }
  if (!myNick) { myNick = '游客' + Math.floor(Math.random() * 900 + 100); localStorage.setItem('gonick', myNick); }

  let myUserId = localStorage.getItem('gobang_user_id');
  if (!myUserId) {
    myUserId = crypto.randomUUID ? crypto.randomUUID() : 'guest_' + Date.now() + '_' + Math.random().toString(36).substr(2, 9);
    localStorage.setItem('gobang_user_id', myUserId);
  }
  let urlUserId = urlParams.get('user_id');
  if (urlUserId) {
    myUserId = urlUserId;
    localStorage.setItem('gobang_user_id', myUserId);
  }

  // ==================== 全局状态 ====================
  window.GAME = {
    isHost: false,
    myUserId: myUserId,
    roomId: null,
    allMembers: new Map(),
    lobbySeats: { black: null, white: null, spectators: Array(6).fill(null) },
    mySeat: null,
    gameStarted: false,
    board: [],
    currentPlayer: 1,
    gameOver: false,
    winner: null,
    moveHistory: [],
    winLines: [],
    forbiddenLines: [],
    isProMode: isProMode,
    roomGameMode: roomGameMode,
    drawRequestHandled: false,
    gameSaved: false
  };

  window._allMembers = window.GAME.allMembers;
  window._myId = null;

  const BOARD_SIZE = 15;
  const CANVAS_SIZE = 800;
  const MARGIN = 50;
  const GRID_SIZE = CANVAS_SIZE - MARGIN * 2;
  const CELL_SIZE = GRID_SIZE / (BOARD_SIZE - 1);
  const stoneRadius = CELL_SIZE * 0.46;

  let canvas = document.getElementById('gobanCanvas');
  let ctx = canvas.getContext('2d');

  // ==================== Supabase 客户端 ====================
  const SUPABASE_URL = 'https://txgemtxikpieaqcohglr.supabase.co';
  const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InR4Z2VtdHhpa3BpZWFxY29oZ2xyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk4MDY1NTIsImV4cCI6MjA5NTM4MjU1Mn0.I0PHUfWmiDpBnfjmTBJ1u6ybzZzhsTG0uaLbKBrcN1c';
  const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

  let currentUser = null;
  let myGuestId = null;

  async function fetchCurrentUser() {
    const { data: { session } } = await supabaseClient.auth.getSession();
    if (session) {
      currentUser = session.user;
      myGuestId = null;
    } else {
      myGuestId = localStorage.getItem('guest_id');
      if (!myGuestId) {
        myGuestId = 'guest_' + Date.now() + '_' + Math.random().toString(36).substr(2, 6);
        localStorage.setItem('guest_id', myGuestId);
      }
      currentUser = null;
    }
  }
  fetchCurrentUser();

  // ========== 工具函数 ==========
  function showToast(msg) {
    let t = document.getElementById('toast');
    t.innerText = msg; t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 2500);
  }

  function copyRoomCode() {
    let rid = document.getElementById('roomCodeDisplay').innerText;
    if (rid && rid !== '----') {
      navigator.clipboard.writeText(rid);
      showToast('房间码已复制: ' + rid);
    } else {
      showToast('暂无房间码');
    }
  }

  function updateEntryDisplay() {
    document.getElementById('displayNickname').innerText = myNick;
    let emailArea = document.getElementById('displayEmailArea');
    if (urlEmail) emailArea.innerText = decodeURIComponent(urlEmail);
    else emailArea.innerText = '';
  }

  // ========== 游戏核心 ==========
  function checkWinWithLine(row, col, player) {
    return Rules.checkWinWithLine(row, col, player, window.GAME.board, BOARD_SIZE);
  }

  function initBoardData() {
    window.GAME.board = Rules.initBoard(BOARD_SIZE);
    window.GAME.currentPlayer = 1;
    window.GAME.gameOver = false;
    window.GAME.winner = null;
    window.GAME.moveHistory = [];
    window.GAME.winLines = [];
    window.GAME.forbiddenLines = [];
    window.GAME.gameSaved = false;
  }

  // ========== 绘制 ==========
  function drawBoard(drawLastMark) {
    if (drawLastMark === undefined) drawLastMark = !isProMode;
    const lastMove = window.GAME.moveHistory.length > 0 ? window.GAME.moveHistory[window.GAME.moveHistory.length - 1] : null;
    Goban.drawBoard(ctx, window.GAME.board, {
      lastMove: lastMove,
      winLines: window.GAME.winLines,
      forbiddenLines: window.GAME.forbiddenLines,
      drawLastMark: drawLastMark,
      boardSize: BOARD_SIZE,
      margin: MARGIN,
      stoneRadius: stoneRadius
    });
  }

  function animateLines(lines, isForbidden, onComplete) {
    let startTime = null, duration = 800;
    function frame(timestamp) {
      if (!startTime) startTime = timestamp;
      let elapsed = timestamp - startTime;
      let progress = Math.min(elapsed / duration, 1);
      let ease = 1 - Math.pow(1 - progress, 3);
      Goban.drawBoard(ctx, window.GAME.board, {
        lastMove: window.GAME.moveHistory.length > 0 ? window.GAME.moveHistory[window.GAME.moveHistory.length - 1] : null,
        winLines: [],
        forbiddenLines: [],
        drawLastMark: false,
        boardSize: BOARD_SIZE,
        margin: MARGIN,
        stoneRadius: stoneRadius
      });
      if (lines.length > 0) {
        Goban.drawLinesProgress(ctx, lines, ease, MARGIN, CELL_SIZE, '#d64531');
      }
      if (progress < 1) requestAnimationFrame(frame);
      else setTimeout(onComplete, 300);
    }
    requestAnimationFrame(frame);
  }

  // ==================== 广播 ====================
  async function broadcastToAll(msg, exceptId) {
    if (msg.type === 'move') {
      await supabaseClient.from('rooms').update({
        board_state: window.GAME.board,
        current_player: window.GAME.currentPlayer,
        move_history: window.GAME.moveHistory,
        game_over: window.GAME.gameOver,
        winner: window.GAME.winner,
        win_lines: window.GAME.winLines,
        forbidden_lines: window.GAME.forbiddenLines
      }).eq('room_code', window.GAME.roomId);
    }
  }

  // ==================== 战绩保存 ====================
  async function saveGameResult() {
    if (window.GAME.gameSaved) return;
    if (!window.GAME.moveHistory || window.GAME.moveHistory.length === 0) return;
    if (!window.GAME.gameOver) return;

    window.GAME.gameSaved = true;
    await fetchCurrentUser();

    let blackName = window.GAME.allMembers.get(window.GAME.lobbySeats.black)?.name || '黑方';
    let whiteName = window.GAME.allMembers.get(window.GAME.lobbySeats.white)?.name || '白方';
    let result = 'draw';
    if (window.GAME.winner === 1) result = 'black';
    else if (window.GAME.winner === 2) result = 'white';
    else if (window.GAME.winner === 'forbidden') result = 'forbidden';

    if (window.GAME.forbiddenLines && window.GAME.forbiddenLines.length > 0 && window.GAME.winner === 2) {
      result = 'forbidden';
    }

    const uid = currentUser ? currentUser.id : null;
    const gid = currentUser ? null : myGuestId;

    try {
      await supabaseClient.from('games').insert({
        room_id: window.GAME.roomId || 'online_' + Date.now(),
        game_mode: window.GAME.roomGameMode || 'casual',
        black_player: blackName,
        white_player: whiteName,
        winner: result,
        moves: window.GAME.moveHistory,
        user_id: uid,
        guest_id: gid
      });
      console.log('战绩已保存');
    } catch (e) {
      console.error('保存战绩失败:', e);
    }
  }

  // ==================== 游戏结束 ====================
  function endGame(winningPlayer, reason) {
    window.GAME.gameOver = true;
    window.GAME.winner = winningPlayer;
    window.UI.updateTurnDisplay(window.GAME.gameStarted, window.GAME.gameOver, window.GAME.winner, window.GAME.currentPlayer, window.GAME.mySeat);
    window.UI.updateGameInfoPanel(window.GAME.lobbySeats, window.GAME.allMembers, window.GAME.mySeat, window.GAME.gameStarted, window.GAME.gameOver, window.GAME.isProMode);
    saveGameResult();

    if (reason === 'forbidden') {
      document.getElementById('winnerMessage').innerText = '⛔ 黑棋禁手！白棋胜';
      animateLines(window.GAME.forbiddenLines, true, () => { showWinnerMsg('forbidden'); });
      return;
    }
    if (window.GAME.winner === 1) document.getElementById('winnerMessage').innerText = '🏆 黑棋五连！胜局 🏆';
    else if (window.GAME.winner === 2) document.getElementById('winnerMessage').innerText = '🏆 白棋五连！胜局 🏆';
    else document.getElementById('winnerMessage').innerText = '🤝 棋盘已满 · 平局 🤝';

    if (window.GAME.winLines.length > 0) animateLines(window.GAME.winLines, false, () => { showWinnerMsg(); });
    else showWinnerMsg();
  }

  function showWinnerMsg(type) {
    let msg, subMsg, className;
    if (type === 'forbidden') {
      msg = '⛔ 黑棋禁手！'; subMsg = '白棋不战而胜'; className = 'end-forbidden';
    } else if (window.GAME.winner === 1) {
      msg = '⚫ 黑方获胜！'; subMsg = '黑棋连珠，技高一筹'; className = 'end-black-win';
    } else if (window.GAME.winner === 2) {
      msg = '⚪ 白方获胜！'; subMsg = '白棋连珠，技高一筹'; className = 'end-white-win';
    } else {
      msg = '🤝 平局！'; subMsg = '旗鼓相当，不分胜负'; className = 'end-draw';
    }
    let overlay = document.getElementById('gameEndOverlay');
    let text = document.getElementById('gameEndText');
    let sub = document.getElementById('gameEndSub');
    let particles = document.getElementById('endParticles');
    text.innerText = msg;
    text.className = 'game-end-text ' + className;
    sub.innerText = subMsg;
    particles.innerHTML = '';
    for (let i = 0; i < 20; i++) {
      let p = document.createElement('div');
      p.className = 'end-particle';
      p.style.left = Math.random() * 100 + '%';
      p.style.top = Math.random() * 100 + '%';
      p.style.animationDelay = Math.random() * 2 + 's';
      p.style.width = (3 + Math.random() * 6) + 'px';
      p.style.height = p.style.width;
      let colors = ['#e9bc6e', '#f5c542', '#e0816b', '#6c9fd1', '#c8aa77'];
      p.style.background = colors[Math.floor(Math.random() * colors.length)];
      particles.appendChild(p);
    }
    overlay.classList.add('show');
    setTimeout(() => {
      if (document.getElementById('gameEndOverlay').classList.contains('show')) {
        exitToLobby();
      }
    }, 3500);
  }

  // ========== 构建上下文 ==========
  function buildContext() {
    return {
      state: window.GAME,
      myNick: myNick,
      myUserId: myUserId,
      broadcastToAll: broadcastToAll,
      drawBoardFn: drawBoard,
      initBoardDataFn: initBoardData,
      checkWinFn: checkWinWithLine,
      endGameFn: endGame,
      showWinnerMsgFn: showWinnerMsg,
      showToastFn: showToast,
      addChatMsgFn: window.Core.addChatMessageOnline,
      updateUIFns: {
        updateLobbyUI: function() { window.UI.updateLobbyUI(window.GAME.lobbySeats, window.GAME.isHost, window.GAME.roomGameMode); },
        updateTurnDisplay: function() { window.UI.updateTurnDisplay(window.GAME.gameStarted, window.GAME.gameOver, window.GAME.winner, window.GAME.currentPlayer, window.GAME.mySeat); },
        updateGameInfoPanel: function() { window.UI.updateGameInfoPanel(window.GAME.lobbySeats, window.GAME.allMembers, window.GAME.mySeat, window.GAME.gameStarted, window.GAME.gameOver, window.GAME.isProMode); },
        updateGameButtons: function() { window.UI.updateGameButtons(window.GAME.mySeat, window.GAME.gameStarted, window.GAME.gameOver); }
      }
    };
  }

  // ========== 包装函数 ==========
  function requestSeat(targetSeat) {
    const context = buildContext();
    SupabaseNetwork.requestSeat(context, targetSeat);
  }
  window.requestSeatGlobal = requestSeat;

  function requestStartGame() {
    const context = buildContext();
    SupabaseNetwork.requestStartGame(context);
  }

  function sendChatMsg() {
    const context = buildContext();
    SupabaseNetwork.sendChatMsg(context);
  }

  function sendSurrender() {
    const context = buildContext();
    SupabaseNetwork.sendSurrender(context);
  }

  function sendDrawRequest() {
    const context = buildContext();
    SupabaseNetwork.sendDrawRequest(context);
  }

  function leaveRoom() {
    const context = buildContext();
    SupabaseNetwork.leaveRoom(context);
  }

  function exitToLobby() {
    const context = buildContext();
    SupabaseNetwork.exitToLobby(context);
  }

  function tryPlace(row, col) {
    const context = buildContext();
    window.Core.tryPlaceOnline(row, col, context);
  }

  // ========== 返回大厅 ==========
  function goToHall() {
    if (window.roomChannel) {
      try { window.roomChannel.unsubscribe(); } catch(e) {}
    }
    if (window.presenceChannel) {
      try { window.presenceChannel.unsubscribe(); } catch(e) {}
    }
    window.location.href = 'index.html';
  }

  // ========== 事件绑定 ==========
  document.getElementById('createRoomBtn').onclick = () => {
    playBgMusic();
    const context = buildContext();
    SupabaseNetwork.createRoom(context);
  };

  document.getElementById('showJoinBtn').onclick = () => {
    let panel = document.getElementById('joinRoomPanel');
    panel.style.display = panel.style.display === 'none' ? 'flex' : 'none';
  };

  document.getElementById('confirmJoinBtn').onclick = () => {
    let code = document.getElementById('joinRoomCodeInput').value.trim().toUpperCase();
    if (code) {
      playBgMusic();
      const context = buildContext();
      SupabaseNetwork.joinRoom(context, code);
    } else showToast('输入房间码');
  };

  canvas.addEventListener('click', (e) => {
    if (!musicStarted) {
      playBgMusic();
      musicStarted = true;
    }

    if (!window.GAME.gameStarted || window.GAME.gameOver) return;
    let rect = canvas.getBoundingClientRect();
    let scale = canvas.width / rect.width;
    let mx = (e.clientX - rect.left) * scale;
    let myY = (e.clientY - rect.top) * scale;
    let col = Math.round((mx - MARGIN) / CELL_SIZE);
    let row = Math.round((myY - MARGIN) / CELL_SIZE);
    if (row >= 0 && row < BOARD_SIZE && col >= 0 && col < BOARD_SIZE && window.GAME.board[row][col] === 0) {
      tryPlace(row, col);
    }
  });

  window.addEventListener('resize', () => {
    if (!document.getElementById('gameScreen').classList.contains('hidden')) drawBoard();
  });

  // ==================== 初始化 ====================
  initAudio();

  updateEntryDisplay();
  window.UI.renderSpectators();

  (async function init() {
    SupabaseNetwork.createSupabaseClient();
    const context = buildContext();
    await SupabaseNetwork.tryReconnect(context);
    if (!window.GAME.roomId) {
      showToast('欢迎！请创建或加入房间');
    }
  })();
</script>
</body>
</html>
