<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>东南五子 · 云端对弈</title>
  <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Noto Serif SC', '楷体', 'KaiTi', serif; }
    body {
      background: #2b1e0f;
      background-image: radial-gradient(circle at 25% 40%, rgba(210, 160, 90, 0.08) 2%, transparent 2.5%);
      background-size: 48px 48px;
      min-height: 100vh;
      color: #ecd9b4;
    }

    .hidden { display: none !important; }
    .toast {
      position: fixed; bottom: 30px; left: 50%;
      transform: translateX(-50%) translateY(100px);
      background: rgba(30, 20, 10, 0.96);
      backdrop-filter: blur(8px);
      color: #f5c542;
      border: 1px solid rgba(245, 197, 66, 0.5);
      padding: 12px 28px; border-radius: 40px;
      font-size: 0.9rem; z-index: 10000;
      opacity: 0; transition: 0.3s; pointer-events: none; white-space: nowrap;
    }
    .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

    .top-bar {
      position: fixed; top: 0; left: 0; right: 0; height: 60px;
      background: rgba(25, 18, 10, 0.85); backdrop-filter: blur(12px);
      border-bottom: 1px solid rgba(230, 190, 110, 0.3);
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 28px; z-index: 100;
    }
    .logo { font-family: 'Orbitron', monospace; font-size: 1.2rem; font-weight: 700; color: #e9bc6e; letter-spacing: 2px; }
    .top-right { display: flex; gap: 20px; align-items: center; }
    .personal-btn {
      background: rgba(200, 160, 100, 0.2); border: 1px solid #e9bc6e;
      border-radius: 40px; padding: 6px 16px; font-size: 0.85rem; transition: 0.2s;
      color: #ecd9b4;
    }
    .room-code-badge {
      font-family: monospace; background: #2a2013;
      padding: 5px 12px; border-radius: 32px; letter-spacing: 1px;
      cursor: pointer; border: 1px solid #bd9a60;
      min-width: 80px;
      text-align: center;
    }
    .conn-status { font-size: 0.8rem; display: flex; align-items: center; gap: 6px; }
    .conn-dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; }
    .conn-online { background: #40c980; box-shadow: 0 0 5px #40c980; }
    .conn-offline { background: #e35f5f; }
    .conn-connecting { background: #e9bc6e; animation: pulse 1s infinite; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }

    #entryScreen {
      min-height: 100vh; display: flex; flex-direction: column;
      align-items: center; justify-content: center; gap: 40px; padding: 20px;
    }
    .entry-card {
      background: rgba(0, 0, 0, 0.55); backdrop-filter: blur(8px);
      padding: 40px 50px; border-radius: 60px; border: 1px solid #e9bc6e; text-align: center;
      max-width: 420px;
      width: 100%;
    }
    .entry-title { font-size: 2.3rem; font-weight: 800; color: #ebc282; margin-bottom: 20px; }
    
    .user-info-display {
      margin: 20px 0;
      padding: 16px 24px;
      background: rgba(0, 0, 0, 0.3);
      border-radius: 24px;
      border: 1px solid rgba(230, 190, 110, 0.3);
    }
    .user-info-display .nick {
      font-size: 1.2rem;
      color: #e9bc6e;
      font-weight: bold;
    }
    .user-info-display .email {
      font-size: 0.85rem;
      color: #a09070;
      margin-top: 4px;
    }

    .entry-buttons { display: flex; gap: 30px; justify-content: center; flex-wrap: wrap; margin-top: 10px; }
    .entry-btn {
      background: linear-gradient(145deg, #e6bb72, #b57c38); border: none;
      padding: 12px 36px; border-radius: 48px; font-size: 1.2rem; font-weight: bold;
      cursor: pointer; transition: 0.1s linear; box-shadow: 0 4px 8px black; color: #1e160c;
    }
    .entry-btn:active { transform: translateY(2px); }
    .join-input-area { margin-top: 25px; display: flex; gap: 12px; justify-content: center; }
    .join-input-area input {
      background: #fef3e2; border: none; padding: 10px 20px;
      border-radius: 60px; font-size: 1rem; width: 180px; text-align: center; font-family: monospace;
    }

    #lobbyScreen { padding-top: 90px; padding-bottom: 40px; display: flex; flex-direction: column; align-items: center; }
    .lobby-mode-bar {
      text-align: center;
      margin-bottom: 12px;
      font-size: 1.15rem;
      color: #e9bc6e;
      font-weight: bold;
      letter-spacing: 1px;
      background: rgba(0,0,0,0.3);
      padding: 10px 28px;
      border-radius: 40px;
      border: 1px solid rgba(230, 190, 110, 0.25);
    }
    .lobby-layout {
      display: flex; gap: 28px; flex-wrap: wrap; justify-content: center;
      max-width: 1300px; margin-top: 10px;
    }
    .lobby-column {
      background: rgba(35, 25, 15, 0.55); backdrop-filter: blur(4px);
      border-radius: 32px; padding: 20px;
      border: 1px solid rgba(220, 180, 100, 0.3);
      min-width: 240px; max-width: 280px;
    }
    .lobby-column-header {
      font-size: 1.3rem; font-weight: bold; text-align: center;
      border-bottom: 2px solid; margin-bottom: 18px; padding-bottom: 6px;
    }
    .col-black .lobby-column-header { color: #e0816b; border-color: #b15a44; }
    .col-white .lobby-column-header { color: #6c9fd1; border-color: #3e6d9b; }
    .col-spec .lobby-column-header { color: #c6974e; border-color: #a7732c; }
    .seat-card {
      background: rgba(20, 15, 8, 0.7); border: 2px solid rgba(210, 170, 90, 0.4);
      border-radius: 24px; padding: 16px; margin-bottom: 14px;
      display: flex; flex-direction: column; align-items: center; gap: 8px;
      cursor: pointer; transition: 0.15s;
    }
    .seat-card:hover:not(.occupied-seat) { border-color: #ebc282; transform: translateY(-2px); background: #2f241bc9; }
    .occupied-seat { cursor: default; opacity: 0.85; }
    .seat-card.is-me-seat { border-color: #f5c542; box-shadow: 0 0 12px rgba(245,197,66,0.3); background: #3e2e1d; }
    .seat-avatar {
      width: 56px; height: 56px; border-radius: 56px;
      display: flex; align-items: center; justify-content: center;
      font-size: 1.5rem; font-weight: bold;
    }
    .seat-avatar.empty-avatar { background: #372d1e80; border: 2px dashed #bd9a60; color: #bd9a60; }
    .seat-avatar.black-avatar { background: radial-gradient(#5e4b38, #2c1d10); color: #e9dbbc; }
    .seat-avatar.white-avatar { background: radial-gradient(#f7f2e0, #cfb690); color: #2f2418; }
    .seat-avatar.spec-avatar { background: radial-gradient(#6d532f, #4a351b); color: #ffeaad; }
    .seat-name { font-weight: 700; }
    .start-game-btn {
      margin-top: 30px; background: linear-gradient(145deg, #e6bb72, #b57c38);
      border: none; padding: 12px 48px; border-radius: 60px;
      font-size: 1.2rem; font-weight: bold; cursor: pointer;
      display: none; box-shadow: 0 5px 0 #6f441e;
    }
    .start-game-btn.show { display: block; }
    .start-game-btn:active { transform: translateY(2px); box-shadow: 0 2px 0 #6f441e; }

    #gameScreen { padding-top: 70px; min-height: 100vh; }
    .game-container {
      display: flex;
      width: 100%;
      margin: 0;
      background: #1f160e;
      border-radius: 0;
      overflow: hidden;
      min-height: calc(100vh - 70px);
    }
    .board-panel {
      flex: 3;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 15px;
      min-width: 0;
    }
    .board-wrap {
      background: #e1c394;
      padding: 15px;
      border-radius: 24px;
      box-shadow: 0 20px 35px rgba(0,0,0,0.5);
      width: 100%;
      max-width: 920px;
    }
    canvas {
      display: block;
      border-radius: 16px;
      background: #eedbbc;
      cursor: pointer;
      width: 100%;
      height: auto;
    }
    .chat-panel {
      flex: 1;
      background: rgba(30, 22, 14, 0.9);
      backdrop-filter: blur(6px);
      border-left: 1px solid #bd9a60;
      display: flex;
      flex-direction: column;
      min-width: 320px;
      max-width: 400px;
      height: calc(100vh - 70px);
    }

    .game-info {
      padding: 18px 16px;
      border-bottom: 2px solid #5e4a31;
      font-size: 1.05rem;
      line-height: 1.8;
    }
    .game-info > div { margin-bottom: 4px; }
    .mini-players {
      display: flex;
      gap: 12px;
      margin-top: 14px;
    }
    .mini-card {
      flex: 1;
      background: #2b211a;
      border-radius: 16px;
      padding: 12px 8px;
      text-align: center;
      border: 2px solid transparent;
      transition: 0.3s;
      font-size: 0.95rem;
    }
    .mini-card.active-black {
      border-color: #e0816b;
      box-shadow: 0 0 15px rgba(224, 129, 107, 0.25);
      background: #3d2218;
    }
    .mini-card.active-white {
      border-color: #6c9fd1;
      box-shadow: 0 0 15px rgba(108, 159, 209, 0.25);
      background: #1e2a3d;
    }
    .mini-card div:first-child { font-weight: bold; margin-bottom: 4px; }
    .mini-card div:last-child { font-weight: 700; color: #e9bc6e; }
    .turn-indicator {
      font-weight: 800;
      margin: 14px 0 8px;
      font-size: 1.5rem;
      color: #f5c542;
      text-shadow: 0 0 12px rgba(245, 197, 66, 0.4);
      text-align: center;
      padding: 8px;
      background: rgba(245, 197, 66, 0.08);
      border-radius: 12px;
      border: 1px solid rgba(245, 197, 66, 0.2);
    }
    #winnerMessage {
      color: #e9bc6e;
      font-size: 1.1rem;
      font-weight: bold;
      text-align: center;
      margin-top: 6px;
      min-height: 1.5em;
    }

    .chat-messages {
      flex: 1;
      overflow-y: auto;
      padding: 12px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .chat-msg { max-width: 90%; padding: 6px 12px; border-radius: 18px; font-size: 0.85rem; }
    .chat-msg.me { align-self: flex-end; background: #e9bc6e; color: #211c12; }
    .chat-msg.other { background: #4a3a28; color: #f7efda; }
    .chat-msg.system { align-self: center; background: #2e241b; color: #e9bc6e; font-size: 0.75rem; }
    .chat-input-area { display: flex; padding: 12px; gap: 8px; border-top: 1px solid #5e4a31; }
    .chat-input-area input {
      flex: 1; background: #2f241b; border: 1px solid #b69054;
      border-radius: 40px; padding: 8px 15px; color: #f2e1c0;
    }
    .game-btn {
      background: #c89d60; border: none; border-radius: 30px;
      padding: 6px 18px; font-weight: bold; cursor: pointer;
    }
    .game-btn:disabled {
      background: #5a4a3a;
      cursor: not-allowed;
      opacity: 0.5;
    }

    .game-end-overlay {
      position: fixed;
      top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(10, 6, 2, 0.92);
      backdrop-filter: blur(12px);
      z-index: 99999;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      visibility: hidden;
      opacity: 0;
      transition: opacity 0.5s ease;
    }
    .game-end-overlay.show {
      visibility: visible;
      opacity: 1;
    }
    .game-end-text {
      font-size: 4rem;
      font-weight: 900;
      text-align: center;
      transform: scale(0.3) translateY(40px);
      opacity: 0;
      transition: all 0.7s cubic-bezier(0.34, 1.56, 0.64, 1);
      letter-spacing: 4px;
    }
    .game-end-overlay.show .game-end-text {
      transform: scale(1) translateY(0);
      opacity: 1;
    }
    .game-end-text.end-black-win {
      color: #e0816b;
      text-shadow: 0 0 40px rgba(224, 129, 107, 0.6), 0 0 80px rgba(224, 129, 107, 0.3);
    }
    .game-end-text.end-white-win {
      color: #6c9fd1;
      text-shadow: 0 0 40px rgba(108, 159, 209, 0.6), 0 0 80px rgba(108, 159, 209, 0.3);
    }
    .game-end-text.end-draw {
      color: #c8aa77;
      text-shadow: 0 0 40px rgba(200, 170, 119, 0.6), 0 0 80px rgba(200, 170, 119, 0.3);
    }
    .game-end-text.end-forbidden {
      color: #e0816b;
      text-shadow: 0 0 40px rgba(224, 129, 107, 0.6), 0 0 80px rgba(224, 129, 107, 0.3);
    }
    .game-end-sub {
      margin-top: 24px;
      font-size: 1.3rem;
      color: #a09070;
      opacity: 0;
      transform: translateY(20px);
      transition: all 0.5s ease 0.4s;
    }
    .game-end-overlay.show .game-end-sub {
      opacity: 1;
      transform: translateY(0);
    }

    .turn-reminder {
      text-align: center;
      font-size: 2.2rem;
      font-weight: 900;
      padding: 16px 28px;
      margin-bottom: 16px;
      border-radius: 20px;
      transition: all 0.3s ease;
      letter-spacing: 3px;
      text-shadow: 0 2px 8px rgba(0,0,0,0.3);
    }
    .turn-reminder.my-turn {
      background: rgba(224, 129, 107, 0.2);
      color: #e0816b;
      border: 3px solid rgba(224, 129, 107, 0.6);
      box-shadow: 0 0 30px rgba(224, 129, 107, 0.35), inset 0 0 20px rgba(224, 129, 107, 0.1);
      animation: turnPulse 1.2s ease-in-out infinite;
    }
    .turn-reminder.opponent-turn {
      background: rgba(108, 159, 209, 0.2);
      color: #6c9fd1;
      border: 3px solid rgba(108, 159, 209, 0.6);
      box-shadow: 0 0 30px rgba(108, 159, 209, 0.25), inset 0 0 20px rgba(108, 159, 209, 0.1);
    }
    .turn-reminder.waiting {
      background: rgba(200, 170, 119, 0.2);
      color: #c8aa77;
      border: 3px solid rgba(200, 170, 119, 0.6);
      box-shadow: 0 0 30px rgba(200, 170, 119, 0.25), inset 0 0 20px rgba(200, 170, 119, 0.1);
    }
    @keyframes turnPulse {
      0%, 100% { transform: scale(1); box-shadow: 0 0 30px rgba(224, 129, 107, 0.35), inset 0 0 20px rgba(224, 129, 107, 0.1); }
      50% { transform: scale(1.05); box-shadow: 0 0 50px rgba(224, 129, 107, 0.55), inset 0 0 30px rgba(224, 129, 107, 0.2); }
    }

    .end-particles {
      position: absolute;
      top: 0; left: 0; width: 100%; height: 100%;
      pointer-events: none;
      overflow: hidden;
    }
    .end-particle {
      position: absolute;
      width: 6px; height: 6px;
      background: #e9bc6e;
      border-radius: 50%;
      opacity: 0;
    }
    .game-end-overlay.show .end-particle {
      animation: particleFloat 3s ease-in-out infinite;
    }
    @keyframes particleFloat {
      0% { opacity: 0; transform: translateY(0) scale(0); }
      20% { opacity: 0.8; transform: translateY(-30px) scale(1); }
      100% { opacity: 0; transform: translateY(-200px) scale(0.5); }
    }

    @media (max-width: 768px) {
      .top-bar { height: 50px; padding: 0 12px; }
      .logo { font-size: 0.9rem; letter-spacing: 1px; }
      .top-right { gap: 8px; }
      .personal-btn { padding: 4px 10px; font-size: 0.75rem; }
      .room-code-badge { padding: 4px 8px; font-size: 0.8rem; min-width: 60px; }
      .conn-status { font-size: 0.7rem; }

      #entryScreen { padding: 10px; gap: 20px; }
      .entry-card { padding: 24px 20px; border-radius: 32px; width: 100%; max-width: 360px; }
      .entry-title { font-size: 1.5rem; }
      .entry-buttons { gap: 15px; }
      .entry-btn { padding: 10px 24px; font-size: 1rem; }
      .join-input-area { flex-direction: column; align-items: center; gap: 8px; }
      .join-input-area input { width: 160px; }
      .user-info-display { padding: 12px 16px; }

      #lobbyScreen { padding-top: 70px; padding-bottom: 20px; }
      .lobby-mode-bar { font-size: 1rem; padding: 8px 20px; }
      .lobby-layout { gap: 12px; padding: 0 10px; }
      .lobby-column { min-width: 140px; max-width: 100%; padding: 12px; border-radius: 20px; }
      .lobby-column-header { font-size: 1rem; margin-bottom: 10px; }
      .seat-card { padding: 10px; margin-bottom: 8px; border-radius: 16px; }
      .seat-avatar { width: 40px; height: 40px; font-size: 1.1rem; }
      .seat-name { font-size: 0.85rem; }
      .seat-status { font-size: 0.75rem; }
      .start-game-btn { padding: 10px 32px; font-size: 1rem; }

      #gameScreen { padding-top: 50px; }
      .game-container { flex-direction: column; border-radius: 0; margin: 0; min-height: auto; }
      .board-panel { flex: none; padding: 8px; }
      .board-wrap { padding: 8px; border-radius: 16px; max-width: 100%; }
      .chat-panel {
        border-left: none;
        border-top: 2px solid #bd9a60;
        height: 280px;
        min-width: auto;
        max-width: 100%;
        flex: none;
      }
      .game-info { padding: 10px; font-size: 0.9rem; line-height: 1.6; }
      .mini-players { gap: 8px; margin-top: 8px; }
      .mini-card { padding: 8px 4px; font-size: 0.8rem; }
      .turn-indicator { font-size: 1.1rem; margin: 8px 0; padding: 6px; }
      .chat-input-area { padding: 8px; }
      .chat-input-area input { padding: 6px 12px; }
      .game-btn { padding: 5px 14px; font-size: 0.85rem; }

      .game-end-text { font-size: 2.2rem; }
      .game-end-sub { font-size: 1rem; }
    }

    @media (max-width: 400px) {
      .logo { font-size: 0.75rem; }
      .entry-title { font-size: 1.2rem; }
      .lobby-column { min-width: 120px; padding: 8px; }
      .seat-avatar { width: 36px; height: 36px; font-size: 1rem; }
    }
  </style>

<body>

<div id="toast" class="toast"></div>
<div class="top-bar">
  <div class="logo">⚫ 东南五子·弈 ⚪</div>
  <div class="top-right">
    <div class="personal-btn" id="personalCenterBtn">🧑 个人中心</div>
    <div class="conn-status"><span class="conn-dot conn-connecting" id="statusDot"></span><span id="statusText">未连接</span></div>
    <div class="room-code-badge" id="roomCodeDisplay" onclick="copyRoomCode()">----</div>
  </div>
</div>

<div id="entryScreen">
  <div class="entry-card">
    <div class="entry-title">⚫ 五子棋 · 云端对弈 ⚪</div>
    
    <div class="user-info-display" id="userInfoDisplay">
      <div class="nick">👤 <span id="displayNickname">游客</span></div>
      <div class="email" id="displayEmailArea"></div>
    </div>

    <div class="entry-buttons">
      <button class="entry-btn" id="createRoomBtn">🏮 创建房间</button>
      <button class="entry-btn" id="showJoinBtn">🎋 加入房间</button>
    </div>
    <div id="joinRoomPanel" style="display: none;" class="join-input-area">
      <input type="text" id="joinRoomCodeInput" placeholder="房间代码" maxlength="8" autocomplete="off">
      <button class="entry-btn" id="confirmJoinBtn">进入</button>
    </div>
  </div>
</div>

<div id="lobbyScreen" class="hidden">
  <div class="lobby-mode-bar" id="lobbyModeBar">🎮 当前模式：业余模式</div>
  <div class="lobby-layout">
    <div class="lobby-column col-black">
      <div class="lobby-column-header">⚫ 黑棋方</div>
      <div class="seat-card" id="seatBlackCard" onclick="requestSeat('black')">
        <div class="seat-avatar empty-avatar" id="blackAvatar">+</div>
        <div class="seat-name" id="blackName">空位</div>
        <div class="seat-status" id="blackStatus">点击入座</div>
      </div>
    </div>
    <div class="lobby-column col-white">
      <div class="lobby-column-header">⚪ 白棋方</div>
      <div class="seat-card" id="seatWhiteCard" onclick="requestSeat('white')">
        <div class="seat-avatar empty-avatar" id="whiteAvatar">+</div>
        <div class="seat-name" id="whiteName">空位</div>
        <div class="seat-status" id="whiteStatus">点击入座</div>
      </div>
    </div>
    <div class="lobby-column col-spec">
      <div class="lobby-column-header">👁 观战席</div>
      <div id="specSeatsContainer"></div>
    </div>
  </div>
  <button class="start-game-btn" id="startGameButton" onclick="requestStartGame()">▶ 开始对弈</button>
  <button class="game-btn secondary" onclick="leaveRoom()" style="margin-top:15px;">🚪 退出房间</button>
  <div class="lobby-hint" style="margin-top: 20px; color:#c8aa77;">✨ 点击空位换座，有人则不能换</div>
</div>

<div id="gameScreen" class="hidden">
  <div class="game-container">
    <div class="board-panel">
      <div class="board-wrap">
        <div id="turnReminder" class="turn-reminder">⏳ 等待对局开始...</div>
        <canvas id="gobanCanvas" width="700" height="700"></canvas>
        <div style="display: flex; justify-content: center; gap: 15px; margin-top: 15px;">
          <button class="game-btn" id="btnSurrender" onclick="sendSurrender()">🏳️ 投降</button>
          <button class="game-btn" id="btnDraw" onclick="sendDrawRequest()">🤝 平局</button>
        </div>
      </div>
    </div>
    <div class="chat-panel">
      <div class="game-info">
        <div>🏠 房间: <span id="gameRoomCode">----</span></div>
        <div>🎴 你的身份: <span id="myRoleDisplay">观战</span> · <span id="gameStatus">未开始</span></div>

  // ==================== 工具函数 ====================

  // ==================== 禁手检测（完全保留）====================
  function checkForbidden(row, col, boardState) {
    const directions = [[1,0],[0,1],[1,1],[1,-1]];
    let liveThreeCount = 0;
    let fourCount = 0;
    let overline = false;
    let forbiddenLinesResult = [];

    for (let [dx, dy] of directions) {
      let cells = [];
      for (let i = -4; i <= 4; i++) {
        let r = row + dx * i, c = col + dy * i;
        if (r < 0 || r >= BOARD_SIZE || c < 0 || c >= BOARD_SIZE) cells.push(2);
        else cells.push(boardState[r][c]);
      }

      let count = 1;
      for (let i = 1; i <= 4; i++) {
        if (cells[4+i] === 1) count++; else break;
      }
      for (let i = 1; i <= 4; i++) {
        if (cells[4-i] === 1) count++; else break;
      }
      if (count > 5) overline = true;

      if (hasLiveThree(cells)) liveThreeCount++;
      if (hasFour(cells)) fourCount++;
    }

    if (liveThreeCount >= 2 || fourCount >= 2 || overline) {
      forbiddenLinesResult = collectForbiddenLines(row, col, boardState);
    }

    return {
      sanSan: liveThreeCount >= 2,
      siSi: fourCount >= 2,
      overline: overline,
      lines: forbiddenLinesResult
    };
  }

  function collectForbiddenLines(row, col, boardState) {
    const directions = [[1,0],[0,1],[1,1],[1,-1]];
    let lines = [];

    for (let [dx, dy] of directions) {
      let cells = [];
      let positions = [];
      for (let i = -4; i <= 4; i++) {
        let r = row + dx * i, c = col + dy * i;
        if (r < 0 || r >= BOARD_SIZE || c < 0 || c >= BOARD_SIZE) {
          cells.push(2);
          positions.push(null);
        } else {
          cells.push(boardState[r][c]);
          positions.push({r, c});
        }
      }

      if (hasLiveThree(cells)) {
        let line = extractLine(cells, positions, 1, 3);
        if (line.length >= 3) lines.push(line);
      }
      if (hasFour(cells)) {
        let line = extractLine(cells, positions, 1, 4);
        if (line.length >= 4) lines.push(line);
      }
      let count = 1;
      for (let i = 1; i <= 4; i++) {
        if (cells[4+i] === 1) count++; else break;
      }
      for (let i = 1; i <= 4; i++) {
        if (cells[4-i] === 1) count++; else break;
      }
      if (count > 5) {
        let line = [];
        for (let i = -4; i <= 4; i++) {
          if (cells[4+i] === 1 && positions[4+i]) line.push(positions[4+i]);
        }
        if (line.length > 5) lines.push(line);
      }
    }
    return lines;
  }

  function extractLine(cells, positions, targetVal, targetCount) {
    for (let start = 0; start <= 4; start++) {
      let win = cells.slice(start, start + 5);
      let pos = positions.slice(start, start + 5);
      let count = 0, line = [];
      for (let i = 0; i < 5; i++) {
        if (win[i] === targetVal) {
          count++;
          if (pos[i]) line.push(pos[i]);
        }
      }
      if (count === targetCount && line.length === targetCount) {
        return line;
      }
    }
    return [];
  }

  function hasLiveThree(cells) {
    for (let start = 0; start <= 4; start++) {
      let win = cells.slice(start, start + 5);
      let idx = 4 - start;
      if (idx < 0 || idx >= 5 || win[idx] !== 1) continue;
      let blackPos = [], emptyPos = [];
      for (let i = 0; i < 5; i++) {
        if (win[i] === 1) blackPos.push(i);
        else if (win[i] === 0) emptyPos.push(i);
      }
      if (blackPos.length !== 3 || emptyPos.length !== 2) continue;
      if (blackPos[1] - blackPos[0] > 2 || blackPos[2] - blackPos[1] > 2) continue;
      if (emptyPos.includes(0) && emptyPos.includes(4)) return true;
    }
    return false;
  }

  function hasFour(cells) {
    for (let start = 0; start <= 4; start++) {
      let win = cells.slice(start, start + 5);
      let idx = 4 - start;
      if (idx < 0 || idx >= 5 || win[idx] !== 1) continue;
      let blackCount = 0, emptyCount = 0;
      for (let i = 0; i < 5; i++) {
        if (win[i] === 1) blackCount++;
        else if (win[i] === 0) emptyCount++;
      }
      if (blackCount === 4 && emptyCount === 1) return true;
    }
    return false;
  }

  // ==================== 胜负检测（完全保留）====================
  function checkWinWithLine(row, col, player) {
    if (board[row][col] !== player) return null;
    const directions = [[1,0],[0,1],[1,1],[1,-1]];
    for (let d of directions) {
      let count = 1;
      const [dx, dy] = d;
      let line = [{r: row, c: col}];
      for (let step = 1; step < 5; step++) {
        const nr = row + dx * step, nc = col + dy * step;
        if (nr < 0 || nr >= BOARD_SIZE || nc < 0 || nc >= BOARD_SIZE || board[nr][nc] !== player) break;
        count++; line.push({r: nr, c: nc});
      }
      for (let step = 1; step < 5; step++) {
        const nr = row - dx * step, nc = col - dy * step;
        if (nr < 0 || nr >= BOARD_SIZE || nc < 0 || nc >= BOARD_SIZE || board[nr][nc] !== player) break;
        count++; line.unshift({r: nr, c: nc});
      }
      if (count >= 5) return line;
    }
    return null;
  }

  function checkWin(r, c, p) {
    return checkWinWithLine(r, c, p) !== null;
  }

  // ==================== 绘制函数（完全保留）====================
  function drawBoard(drawLastMark) {
    if (drawLastMark === undefined) drawLastMark = !isProMode;
    if (!ctx) return;
    ctx.clearRect(0, 0, CANVAS_SIZE, CANVAS_SIZE);
    ctx.fillStyle = '#eedbbc';
    ctx.fillRect(0, 0, CANVAS_SIZE, CANVAS_SIZE);

    ctx.strokeStyle = '#5c3a1e';
    ctx.lineWidth = 2;
    ctx.strokeRect(MARGIN - 2, MARGIN - 2, GRID_SIZE + 4, GRID_SIZE + 4);

    ctx.strokeStyle = '#6b4c2c';
    ctx.lineWidth = 1.5;
    for (let i = 0; i < BOARD_SIZE; i++) {
      let pos = MARGIN + i * CELL_SIZE;
      ctx.beginPath(); ctx.moveTo(MARGIN, pos); ctx.lineTo(MARGIN + GRID_SIZE, pos); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(pos, MARGIN); ctx.lineTo(pos, MARGIN + GRID_SIZE); ctx.stroke();
    }

    let stars = [[3,3],[3,7],[3,11],[7,3],[7,7],[7,11],[11,3],[11,7],[11,11]];
    ctx.fillStyle = '#4a3a28';
    for (let [r, c] of stars) {
      let x = MARGIN + c * CELL_SIZE;
      let y = MARGIN + r * CELL_SIZE;
      ctx.beginPath(); ctx.arc(x, y, 4, 0, Math.PI * 2); ctx.fill();
    }

    for (let r = 0; r < BOARD_SIZE; r++) {
      for (let c = 0; c < BOARD_SIZE; c++) {
        if (board[r][c] === 0) continue;
        let x = MARGIN + c * CELL_SIZE;
        let y = MARGIN + r * CELL_SIZE;
        drawStone(x, y, board[r][c]);
      }
    }

    if (drawLastMark && moveHistory.length > 0 && !gameOver) {
      let last = moveHistory[moveHistory.length - 1];
      let x = MARGIN + last.col * CELL_SIZE;
      let y = MARGIN + last.row * CELL_SIZE;
      ctx.strokeStyle = '#d64531';
      ctx.lineWidth = 2.5;
      ctx.beginPath();
      ctx.rect(x - stoneRadius - 3, y - stoneRadius - 3, (stoneRadius + 3) * 2, (stoneRadius + 3) * 2);
      ctx.stroke();
    }
  }

  function drawStone(x, y, player) {
    ctx.beginPath();
    ctx.arc(x + 2, y + 2, stoneRadius, 0, Math.PI * 2);
    ctx.fillStyle = 'rgba(0,0,0,0.25)';
    ctx.fill();

    let grad = ctx.createRadialGradient(x - stoneRadius * 0.3, y - stoneRadius * 0.3, stoneRadius * 0.1, x, y, stoneRadius);
    if (player === 1) {
      grad.addColorStop(0, '#6d5a4a');
      grad.addColorStop(0.3, '#3d2e1f');
      grad.addColorStop(1, '#1a120a');
    } else {
      grad.addColorStop(0, '#ffffff');
      grad.addColorStop(0.3, '#f0e6d3');
      grad.addColorStop(1, '#c8bca6');
    }
    ctx.beginPath(); ctx.arc(x, y, stoneRadius, 0, Math.PI * 2);
    ctx.fillStyle = grad; ctx.fill();

    ctx.beginPath();
    ctx.arc(x - stoneRadius * 0.25, y - stoneRadius * 0.25, stoneRadius * 0.35, 0, Math.PI * 2);
    ctx.fillStyle = player === 1 ? 'rgba(255,255,255,0.08)' : 'rgba(255,255,255,0.6)';
    ctx.fill();
  }

  function drawWinLines(progress) {
    ctx.save();
    ctx.strokeStyle = '#d64531';
    ctx.lineWidth = 3;
    ctx.lineCap = 'round';
    ctx.shadowColor = '#d64531';
    ctx.shadowBlur = 8;

    for (let line of winLines) {
      if (line.length < 2) continue;
      let startX = MARGIN + line[0].c * CELL_SIZE;
      let startY = MARGIN + line[0].r * CELL_SIZE;
      let endX = MARGIN + line[line.length - 1].c * CELL_SIZE;
      let endY = MARGIN + line[line.length - 1].r * CELL_SIZE;

      let curX = startX + (endX - startX) * progress;
      let curY = startY + (endY - startY) * progress;

      ctx.beginPath();
      ctx.moveTo(startX, startY);
      ctx.lineTo(curX, curY);
      ctx.stroke();
    }
    ctx.restore();
  }

  function drawForbiddenLines(progress) {
    ctx.save();
    ctx.strokeStyle = '#d64531';
    ctx.lineWidth = 3;
    ctx.lineCap = 'round';
    ctx.shadowColor = '#d64531';
    ctx.shadowBlur = 8;

    for (let line of forbiddenLines) {
      if (line.length < 2) continue;
      let startX = MARGIN + line[0].c * CELL_SIZE;
      let startY = MARGIN + line[0].r * CELL_SIZE;
      let endX = MARGIN + line[line.length - 1].c * CELL_SIZE;
      let endY = MARGIN + line[line.length - 1].r * CELL_SIZE;

      let curX = startX + (endX - startX) * progress;
      let curY = startY + (endY - startY) * progress;

      ctx.beginPath();
      ctx.moveTo(startX, startY);
      ctx.lineTo(curX, curY);
      ctx.stroke();
    }
    ctx.restore();
  }

  function animateLines(lines, isForbidden, onComplete) {
    let startTime = null;
    let duration = 800;

    function frame(timestamp) {
      if (!startTime) startTime = timestamp;
      let elapsed = timestamp - startTime;
      let progress = Math.min(elapsed / duration, 1);
      let ease = 1 - Math.pow(1 - progress, 3);

      drawBoard(false);
      if (isForbidden) drawForbiddenLines(ease);
      else drawWinLines(ease);

      if (progress < 1) {
        requestAnimationFrame(frame);
      } else {
        setTimeout(onComplete, 300);
      }
    }
    requestAnimationFrame(frame);
  }

  // ==================== 游戏状态 ====================
  function initBoardData() {
    board = Array(BOARD_SIZE).fill().map(() => Array(BOARD_SIZE).fill(0));
    currentPlayer = 1; gameOver = false; winner = null; moveHistory = [];
    winLines = [];
    forbiddenLines = [];
  }

  function isFull() {
    for (let i = 0; i < BOARD_SIZE; i++) {
      for (let j = 0; j < BOARD_SIZE; j++) {
        if (board[i][j] === 0) return false;
      }
    }
    return true;
  }

  // ==================== Supabase 网络层 ====================
  async function createRoom() {
    if (!validateNickname()) return;

            room_code: roomCode,

            board_state: null,
            current_player: 1,
            game_started: false,

            winner: null,
            move_history: [],
            win_lines: [],
            forbidden_lines: [],
            draw_request_by: null,
            end_reason: null
        });
        if (roomErr) throw roomErr;

        const { error: playerErr } = await supabaseClient.from('room_players').insert({
            room_code: roomCode,
            user_id: myUserId,
            nickname: myNick,
            seat: 'black',
            is_online: true,
            last_seen: new Date().toISOString()
        });
        if (playerErr) throw playerErr;

        mySeat = 'black';
        localStorage.setItem('gobang_current_room', roomCode);
        
        // ===== 关键修复：立即设置 currentRoom =====
        currentRoom = {
            room_code: roomCode,
            host_id: myUserId,
            mode: roomGameMode,
            status: 'waiting',
            game_started: false,
            game_over: false,
            winner: null
        };
        // ==========================================

        document.getElementById('roomCodeDisplay').innerText = roomCode;
        document.getElementById('gameRoomCode').innerText = roomCode;

        setupSubscription();

        document.getElementById('entryScreen').classList.add('hidden');
        document.getElementById('lobbyScreen').classList.remove('hidden');
        renderSpectators();
        updateLobbyUI();
        lockNicknameDisplay();
        showToast('房间已创建：' + roomCode);
        startHeartbeat();
    } catch (e) {
        showToast('创建房间失败：' + e.message);
        console.error(e);
        roomCode = null;
    }
}

  async function joinRoom(code) {
    if (!validateNickname()) return;
    roomCode = code.toUpperCase();
    isHost = false;

    try {
      const { data: room, error: roomErr } = await supabaseClient
        .from('rooms')
        .select('*')
        .eq('room_code', roomCode)
        .single();

      if (roomErr || !room) {
        showToast('房间不存在');
        roomCode = null;
        return;
      }
      if (room.status === 'closed') {
        showToast('房间已关闭');
        roomCode = null;
        return;
      }

      roomGameMode = room.mode || 'casual';
      isProMode = roomGameMode === 'pro';
      currentRoom = room;

      const { error: playerErr } = await supabaseClient.from('room_players').upsert({
        room_code: roomCode,
        user_id: myUserId,
        nickname: myNick,
        seat: null,
        is_online: true,
        last_seen: new Date().toISOString()
      }, { onConflict: 'room_code,user_id' });

      if (playerErr && playerErr.code !== '23505') throw playerErr;

      await autoAssignSeat();

      localStorage.setItem('gobang_current_room', roomCode);
      document.getElementById('roomCodeDisplay').innerText = roomCode;
      document.getElementById('gameRoomCode').innerText = roomCode;

      setupSubscription();

      document.getElementById('entryScreen').classList.add('hidden');
      document.getElementById('lobbyScreen').classList.remove('hidden');
      renderSpectators();
      updateLobbyUI();
      lockNicknameDisplay();
      showToast('已加入房间：' + roomCode);
      startHeartbeat();
    } catch (e) {
      showToast('加入房间失败：' + e.message);
      console.error(e);
      roomCode = null;
    }
  }

  async function autoAssignSeat() {
    const { data: players } = await supabaseClient
      .from('room_players')
      .select('seat')
      .eq('room_code', roomCode);

    let hasBlack = false, hasWhite = false;
    let maxSpec = -1;

    if (players) {
      for (let p of players) {
        if (p.seat === 'black') hasBlack = true;
        else if (p.seat === 'white') hasWhite = true;
        else if (p.seat && p.seat.startsWith('spec-')) {
          let idx = parseInt(p.seat.split('-')[1]);
          if (idx > maxSpec) maxSpec = idx;
        }
      }
    }

    let targetSeat;
    if (!hasBlack) targetSeat = 'black';
    else if (!hasWhite) targetSeat = 'white';
    else targetSeat = 'spec-' + Math.min(maxSpec + 1, 5);

    if (targetSeat) {
      await supabaseClient.from('room_players')
        .update({ seat: targetSeat })
        .eq('room_code', roomCode)
        .eq('user_id', myUserId);
      mySeat = targetSeat;
    }
  }

  function setupSubscription() {
    if (realtimeChannel) {
      supabaseClient.removeChannel(realtimeChannel);
    }

    realtimeChannel = supabaseClient
      .channel('room:' + roomCode)
      .on('postgres_changes', {
        event: '*',
        schema: 'public',
        table: 'rooms',
        filter: 'room_code=eq.' + roomCode
      }, (payload) => {
        handleRoomUpdate(payload.new, payload.old, payload.eventType);
      })
      .on('postgres_changes', {
        event: '*',
        schema: 'public',
        table: 'room_players',
        filter: 'room_code=eq.' + roomCode
      }, (payload) => {
        handlePlayersUpdate();
      })
      .on('postgres_changes', {
        event: 'INSERT',
        schema: 'public',
        table: 'messages',
        filter: 'room_code=eq.' + roomCode
      }, (payload) => {
        const msg = payload.new;
        if (msg.sender_name !== myNick) {
          addChatMessage(msg.sender_name, msg.text, 'other');
        }
      })
      .subscribe((status) => {
        updateConnUI(status === 'SUBSCRIBED');
      });
  }

  async function handleRoomUpdate(newRow, oldRow, eventType) {
    if (!newRow) return;
    currentRoom = newRow;
    isHost = newRow.host_id === myUserId;

    if (newRow.mode) {
      roomGameMode = newRow.mode;
      isProMode = roomGameMode === 'pro';
    }

    // 游戏开始
    if (newRow.game_started && !gameStarted) {
      gameStarted = true;
      initBoardData();
      if (newRow.board_state) board = newRow.board_state;
      currentPlayer = newRow.current_player || 1;
      moveHistory = newRow.move_history || [];
      winLines = newRow.win_lines || [];
      forbiddenLines = newRow.forbidden_lines || [];

      document.getElementById('lobbyScreen').classList.add('hidden');
      document.getElementById('gameScreen').classList.remove('hidden');
      drawBoard();
      updateGameInfoPanel();
      updateTurnDisplay();
      updateGameButtons();
      showToast('对局开始！');
      return;
    }

    // 游戏中状态同步
    if (gameStarted) {
      if (newRow.board_state) {
        board = newRow.board_state;
        currentPlayer = newRow.current_player;
        moveHistory = newRow.move_history || [];
        winLines = newRow.win_lines || [];
        forbiddenLines = newRow.forbidden_lines || [];
        drawBoard();
        updateTurnDisplay();
        updateGameInfoPanel();
      }

      if (newRow.game_over && !gameOver) {
        gameOver = true;
        winner = newRow.winner;
        endGame(winner, newRow.end_reason);
      }

      if (newRow.status === 'waiting' && oldRow && (oldRow.status === 'playing' || oldRow.status === 'finished')) {
        returnToLobbyLocal();
      }

      // 平局请求处理
      if (newRow.draw_request_by && newRow.draw_request_by !== myUserId) {
        if (!drawRequestHandled) {
          drawRequestHandled = true;
          setTimeout(async () => {
            if (confirm('对方请求平局，是否同意？')) {
              await supabaseClient.from('rooms').update({
                game_over: true,
                winner: 0,
                draw_request_by: null,
                status: 'finished',
                end_reason: 'draw'
              }).eq('room_code', roomCode);
            } else {
              await supabaseClient.from('rooms').update({
                draw_request_by: null
              }).eq('room_code', roomCode);
              drawRequestHandled = false;
            }
          }, 100);
        }
      } else if (!newRow.draw_request_by) {
        drawRequestHandled = false;
      }
    }
  }

  async function handlePlayersUpdate() {
    const { data: players } = await supabaseClient
      .from('room_players')
      .select('*')
      .eq('room_code', roomCode);

    allMembers.clear();
    lobbySeats = { black: null, white: null, spectators: Array(6).fill(null) };

    if (players) {
      for (let p of players) {
        let isOnline = p.is_online && new Date() - new Date(p.last_seen) < 120000;
        allMembers.set(p.user_id, { name: p.nickname, seat: p.seat, online: isOnline });
        if (p.seat === 'black') lobbySeats.black = p.user_id;
        else if (p.seat === 'white') lobbySeats.white = p.user_id;
        else if (p.seat && p.seat.startsWith('spec-')) {
          let idx = parseInt(p.seat.split('-')[1]);
          if (idx >= 0 && idx < 6) lobbySeats.spectators[idx] = p.user_id;
        }
        if (p.user_id === myUserId) mySeat = p.seat;
      }
    }

    updateLobbyUI();
    if (gameStarted) updateGameInfoPanel();
  }

  async function requestSeat(targetSeat) {
    if (!roomCode) return;
    if (mySeat === targetSeat) return;

    const { data: occupant } = await supabaseClient
      .from('room_players')
      .select('user_id')
      .eq('room_code', roomCode)
      .eq('seat', targetSeat)
      .maybeSingle();

    if (occupant && occupant.user_id && occupant.user_id !== myUserId) {
      showToast('该位置已有人');
      return;
    }

    // 先清空自己原座位
    await supabaseClient.from('room_players')
      .update({ seat: null })
      .eq('room_code', roomCode)
      .eq('user_id', myUserId);

    // 设置新座位
    await supabaseClient.from('room_players')
      .update({ seat: targetSeat })
      .eq('room_code', roomCode)
      .eq('user_id', myUserId);

    mySeat = targetSeat;
  }

  async function requestStartGame() {
    let iAmHost = currentRoom && currentRoom.host_id === myUserId;
    if (!iAmHost) return;
    if (!lobbySeats.black || !lobbySeats.white) {
      showToast('双方入座后才可开始');
      return;
    }

    initBoardData();

    await supabaseClient.from('rooms').update({
      game_started: true,
      status: 'playing',
      board_state: board,
      current_player: 1,
      move_history: [],
      game_over: false,
      winner: null,
      win_lines: [],
      forbidden_lines: [],
      draw_request_by: null,
      end_reason: null
    }).eq('room_code', roomCode);

    gameStarted = true;
    document.getElementById('lobbyScreen').classList.add('hidden');
    document.getElementById('gameScreen').classList.remove('hidden');
    drawBoard();
    updateGameInfoPanel();
    updateTurnDisplay();
    updateGameButtons();
    showToast('对局开始！');
  }

  async function tryPlace(row, col) {
    if (gameOver || !gameStarted) return false;
    let myColor = mySeat === 'black' ? 1 : (mySeat === 'white' ? 2 : null);
    if (myColor !== currentPlayer) {
      showToast('请等待对方落子');
      return false;
    }
    if (board[row][col] !== 0) return false;

    // 禁手检查（专业模式）
    if (isProMode && currentPlayer === 1) {
      board[row][col] = 1;
      let forbidden = checkForbidden(row, col, board);
      board[row][col] = 0;
      if (forbidden.sanSan || forbidden.siSi || forbidden.overline) {
        board[row][col] = 1;
        moveHistory.push({ row: row, col: col, player: 1 });
        forbiddenLines = forbidden.lines;
        drawBoard(false);

        await supabaseClient.from('rooms').update({
          board_state: board,
          current_player: 2,
          move_history: moveHistory,
          game_over: true,
          winner: 2,
          forbidden_lines: forbiddenLines,
          end_reason: 'forbidden',
          status: 'finished'
        }).eq('room_code', roomCode);

        endGame(2, 'forbidden');
        return true;
      }
    }

    board[row][col] = currentPlayer;
    moveHistory.push({ row: row, col: col, player: currentPlayer });

    let winLine = checkWinWithLine(row, col, currentPlayer);
    let full = isFull();

    if (winLine) {
      winLines = [winLine];
      gameOver = true;
      winner = currentPlayer;

      await supabaseClient.from('rooms').update({
        board_state: board,
        current_player: (currentPlayer === 1 ? 2 : 1),
        move_history: moveHistory,
        game_over: true,
        winner: currentPlayer,
        win_lines: winLines,
        status: 'finished',
        end_reason: 'win'
      }).eq('room_code', roomCode);

      endGame(currentPlayer);
    } else if (full) {
      gameOver = true;
      winner = 0;

      await supabaseClient.from('rooms').update({
        board_state: board,
        current_player: (currentPlayer === 1 ? 2 : 1),
        move_history: moveHistory,
        game_over: true,
        winner: 0,
        status: 'finished',
        end_reason: 'draw'
      }).eq('room_code', roomCode);

      endGame(0);
    } else {
      let placedPlayer = currentPlayer;
      currentPlayer = (currentPlayer === 1 ? 2 : 1);

      await supabaseClient.from('rooms').update({
        board_state: board,
        current_player: currentPlayer,
        move_history: moveHistory
      }).eq('room_code', roomCode);
    }

    drawBoard();
    updateTurnDisplay();
    updateGameInfoPanel();
    return true;
  }

  async function sendSurrender() {
    if (!gameStarted || gameOver) return;
    if (mySeat !== 'black' && mySeat !== 'white') return;
    if (!confirm('你是否确定要投降？')) return;

    let myColor = mySeat === 'black' ? 1 : 2;
    let winnerColor = myColor === 1 ? 2 : 1;

    await supabaseClient.from('rooms').update({
      game_over: true,
      winner: winnerColor,
      status: 'finished',
      end_reason: 'surrender'
    }).eq('room_code', roomCode);

    gameOver = true;
    winner = winnerColor;
    updateTurnDisplay();
    updateGameInfoPanel();
    showWinnerMsg();
    showToast('你已投降');
  }

  async function sendDrawRequest() {
    if (!gameStarted || gameOver) return;
    if (mySeat !== 'black' && mySeat !== 'white') return;

    await supabaseClient.from('rooms').update({
      draw_request_by: myUserId
    }).eq('room_code', roomCode);

    showToast('已发送平局申请');
  }

  async function sendChatMsg() {
    let inp = document.getElementById('chatMsgInput');
    let txt = inp.value.trim();
    if (!txt) return;
    addChatMessage(myNick, txt, 'me');
    await supabaseClient.from('messages').insert({
      room_code: roomCode,
      sender_name: myNick,
      text: txt
    });
    inp.value = '';
  }

  function addChatMessage(sender, text, type) {
    let container = document.getElementById('chatMessagesArea');
    let div = document.createElement('div');
    div.className = 'chat-msg ' + type;
    div.innerText = type === 'system' ? text : sender + ': ' + text;
    container.appendChild(div);
    container.scrollTop = container.scrollHeight;
  }

  // ==================== 游戏结束与返回 ====================
  function endGame(winningPlayer, reason) {
    gameOver = true;
    winner = winningPlayer;
    updateTurnDisplay();
    updateGameInfoPanel();

    if (reason === 'forbidden') {
      document.getElementById('winnerMessage').innerText = '⛔ 黑棋禁手！白棋胜';
      animateLines(forbiddenLines, true, () => {
        showWinnerMsg('forbidden');
      });
      return;
    }

    if (winner === 1) {
      document.getElementById('winnerMessage').innerText = '🏆 黑棋五连！胜局 🏆';
    } else if (winner === 2) {
      document.getElementById('winnerMessage').innerText = '🏆 白棋五连！胜局 🏆';
    } else {
      document.getElementById('winnerMessage').innerText = '🤝 棋盘已满 · 平局 🤝';
    }

    if (winLines.length > 0) {
      animateLines(winLines, false, () => {
        showWinnerMsg();
      });
    } else {
      showWinnerMsg();
    }
  }

  function showWinnerMsg(type) {
    let msg, subMsg, className;
    if (type === 'forbidden') {
      msg = '⛔ 黑棋禁手！';
      subMsg = '白棋不战而胜';
      className = 'end-forbidden';
    } else if (winner === 1) {
      msg = '⚫ 黑方获胜！';
      subMsg = '黑棋连珠，技高一筹';
      className = 'end-black-win';
    } else if (winner === 2) {
      msg = '⚪ 白方获胜！';
      subMsg = '白棋连珠，技高一筹';
      className = 'end-white-win';
    } else {
      msg = '🤝 平局！';
      subMsg = '旗鼓相当，不分胜负';
      className = 'end-draw';
    }

    let overlay = document.getElementById('gameEndOverlay');
    let text = document.getElementById('gameEndText');
    let sub = document.getElementById('gameEndSub');
    let particles = document.getElementById('endParticles');

    text.innerText = msg;
    text.className = 'game-end-text ' + className;
    sub.innerText = subMsg;

    particles.innerHTML = '';
    for (let i = 0; i < 20; i++) {
      let p = document.createElement('div');
      p.className = 'end-particle';
      p.style.left = Math.random() * 100 + '%';
      p.style.top = Math.random() * 100 + '%';
      p.style.animationDelay = Math.random() * 2 + 's';
      p.style.width = (3 + Math.random() * 6) + 'px';
      p.style.height = p.style.width;
      let colors = ['#e9bc6e', '#f5c542', '#e0816b', '#6c9fd1', '#c8aa77'];
      p.style.background = colors[Math.floor(Math.random() * colors.length)];
      particles.appendChild(p);
    }

    overlay.classList.add('show');
    saveGameResult();

    setTimeout(() => {
      exitToLobby();
    }, 3500);
  }

  async function saveGameResult() {
  if (gameSaved) return;
  gameSaved = true;

  let blackName = allMembers.get(lobbySeats.black)?.name || '黑方';
  let whiteName = allMembers.get(lobbySeats.white)?.name || '白方';
  let result = winner === 1 ? 'black' : (winner === 2 ? 'white' : 'draw');
  if (winner === 2 && forbiddenLines.length > 0) result = 'forbidden';

  // 当前玩家身份：登录用户存 user_id，游客存 guest_id
  let uid = currentUser ? currentUser.id : null;
  let gid = currentUser ? null : myUserId;

  try {
    await supabaseClient.from('games').insert({
      room_id: roomCode,
      game_mode: roomGameMode,
      black_player: blackName,
      white_player: whiteName,
      winner: result,
      moves: moveHistory,
      user_id: uid,
      guest_id: gid
    });
    console.log('战绩已保存，用户类型:', currentUser ? '登录用户' : '游客');
  } catch (e) {
    console.error('保存战绩失败:', e);
  }
}

  async function exitToLobby() {
    document.getElementById('gameEndOverlay').classList.remove('show');
    returnToLobbyLocal();
    // 游戏结束回到席位页，保留房间数据，方便继续下一局
  }

  async function leaveRoom() {
    if (!roomCode) return;
    if (!confirm('确定退出当前房间？')) return;

    let iAmHost = currentRoom && currentRoom.host_id === myUserId;

    if (iAmHost) {
      // 房主：删除整个房间、所有玩家、所有消息
      await supabaseClient.from('room_players').delete().eq('room_code', roomCode);
      await supabaseClient.from('rooms').delete().eq('room_code', roomCode);
      await supabaseClient.from('messages').delete().eq('room_code', roomCode);
    } else {
      // 普通玩家：只删除自己的记录
      await supabaseClient.from('room_players').delete()
        .eq('room_code', roomCode)
        .eq('user_id', myUserId);
    }

    // 清理本地状态
    roomCode = null;
    currentRoom = null;
    localStorage.removeItem('gobang_current_room');
    if (realtimeChannel) {
      supabaseClient.removeChannel(realtimeChannel);
      realtimeChannel = null;
    }

    document.getElementById('lobbyScreen').classList.add('hidden');
    document.getElementById('entryScreen').classList.remove('hidden');
    showToast('已退出房间');
  }

  function returnToLobbyLocal() {
    gameStarted = false;
    gameOver = false;
    winner = null;
    gameSaved = false;
    initBoardData();

    document.getElementById('gameScreen').classList.add('hidden');
    document.getElementById('lobbyScreen').classList.remove('hidden');

    updateLobbyUI();
    updateTurnDisplay();
    updateGameInfoPanel();
    showToast('已返回房间，准备下一局');
  }

  // ==================== UI 更新（保留）====================
  function updateLobbyUI() {
    updateSeatUI('black', lobbySeats.black);
    updateSeatUI('white', lobbySeats.white);
    for (let i = 0; i < 6; i++) updateSeatUI('spec-' + i, lobbySeats.spectators[i]);

    let startBtn = document.getElementById('startGameButton');
    let iAmHost = currentRoom && currentRoom.host_id === myUserId;
    if (iAmHost && lobbySeats.black && lobbySeats.white) startBtn.classList.add('show');
    else startBtn.classList.remove('show');

    let modeText = roomGameMode === 'pro' ? '专业模式（禁手规则）' : '业余模式（自由对弈）';
    let modeEl = document.getElementById('lobbyModeBar');
    if (modeEl) modeEl.innerText = '🎮 当前模式：' + modeText;
  }

  function updateSeatUI(seatId, occupantId) {
    let isBlack = seatId === 'black';
    let isWhite = seatId === 'white';
    let isSpec = seatId.startsWith('spec-');
    let idx = isSpec ? parseInt(seatId.split('-')[1]) : -1;

    let avatarDiv, nameSpan, statusSpan, cardDiv;
    if (isBlack) {
      avatarDiv = document.getElementById('blackAvatar');
      nameSpan = document.getElementById('blackName');
      statusSpan = document.getElementById('blackStatus');
      cardDiv = document.getElementById('seatBlackCard');
    } else if (isWhite) {
      avatarDiv = document.getElementById('whiteAvatar');
      nameSpan = document.getElementById('whiteName');
      statusSpan = document.getElementById('whiteStatus');
      cardDiv = document.getElementById('seatWhiteCard');
    } else {
      avatarDiv = document.getElementById('specAvatar' + idx);
      nameSpan = document.getElementById('specName' + idx);
      statusSpan = document.getElementById('specStatus' + idx);
      cardDiv = document.getElementById('specCard' + idx);
    }
    if (!avatarDiv) return;

    if (occupantId) {
      let member = allMembers.get(occupantId);
      let displayName = member ? member.name : '棋客';
      avatarDiv.innerText = displayName.charAt(0);
      avatarDiv.className = 'seat-avatar ' + (isBlack ? 'black-avatar' : (isWhite ? 'white-avatar' : 'spec-avatar'));
      nameSpan.innerText = displayName + (occupantId === myUserId ? ' (我)' : '');
      statusSpan.innerText = '已入座';
      cardDiv.classList.add('occupied-seat');
      if (occupantId === myUserId) cardDiv.classList.add('is-me-seat');
      else cardDiv.classList.remove('is-me-seat');
    } else {
      avatarDiv.innerText = '+';
      avatarDiv.className = 'seat-avatar empty-avatar';
      nameSpan.innerText = '空位';
      statusSpan.innerText = '点击入座';
      cardDiv.classList.remove('occupied-seat', 'is-me-seat');
    }
  }

  function renderSpectators() {
    let container = document.getElementById('specSeatsContainer');
    if (!container) return;
    container.innerHTML = '';
    for (let i = 0; i < 6; i++) {
      let div = document.createElement('div');
      div.className = 'seat-card';
      div.onclick = function() { requestSeat('spec-' + i); };
      div.id = 'specCard' + i;
      div.innerHTML = `
        <div class="seat-avatar empty-avatar" id="specAvatar${i}">+</div>
        <div class="seat-name" id="specName${i}">空位</div>
        <div class="seat-status" id="specStatus${i}">点击入座</div>
      `;
      container.appendChild(div);
    }
  }

  function getSeatOccupant(seatId) {
    if (seatId === 'black') return lobbySeats.black;
    if (seatId === 'white') return lobbySeats.white;
    if (seatId.startsWith('spec-')) {
      let idx = parseInt(seatId.split('-')[1]);
      return lobbySeats.spectators[idx];
    }
    return null;
  }

  function setSeat(seatId, pid) {
    if (seatId === 'black') lobbySeats.black = pid;
    else if (seatId === 'white') lobbySeats.white = pid;
    else if (seatId.startsWith('spec-')) {
      let idx = parseInt(seatId.split('-')[1]);
      if (idx >= 0 && idx < 6) lobbySeats.spectators[idx] = pid;
    }
  }

  function clearAllSeatsOf(pid) {
    if (lobbySeats.black === pid) lobbySeats.black = null;
    if (lobbySeats.white === pid) lobbySeats.white = null;
    for (let i = 0; i < 6; i++) {
      if (lobbySeats.spectators[i] === pid) lobbySeats.spectators[i] = null;
    }
  }

  function findSeatOf(pid) {
    if (lobbySeats.black === pid) return 'black';
    if (lobbySeats.white === pid) return 'white';
    for (let i = 0; i < 6; i++) {
      if (lobbySeats.spectators[i] === pid) return 'spec-' + i;
    }
    return null;
  }

  function updateTurnDisplay() {
    let turnText = !gameStarted ? '等待开始' : (gameOver ? (winner === 1 ? '黑方胜' : (winner === 2 ? '白方胜' : '和棋')) : (currentPlayer === 1 ? '⚫ 黑棋回合' : '⚪ 白棋回合'));
    document.getElementById('turnIndicator').innerText = turnText;

    let miniBlack = document.getElementById('miniBlack');
    let miniWhite = document.getElementById('miniWhite');
    miniBlack.classList.remove('active-black');
    miniWhite.classList.remove('active-white');
    if (gameStarted && !gameOver) {
      if (currentPlayer === 1) miniBlack.classList.add('active-black');
      else miniWhite.classList.add('active-white');
    }

    let reminder = document.getElementById('turnReminder');
    if (!reminder) return;

    if (!gameStarted) {
      reminder.innerText = '⏳ 等待对局开始...';
      reminder.className = 'turn-reminder waiting';
    } else if (gameOver) {
      reminder.innerText = winner === 0 ? '🤝 平局结束' : (winner === 1 ? '⚫ 黑方获胜' : '⚪ 白方获胜');
      reminder.className = 'turn-reminder waiting';
    } else {
      let myColor = mySeat === 'black' ? 1 : (mySeat === 'white' ? 2 : null);
      if (myColor === null) {
        reminder.innerText = currentPlayer === 1 ? '👁 黑棋回合' : '👁 白棋回合';
        reminder.className = 'turn-reminder opponent-turn';
      } else if (myColor === currentPlayer) {
        reminder.innerText = myColor === 1 ? '⚫ 你的回合 — 请落子' : '⚪ 你的回合 — 请落子';
        reminder.className = 'turn-reminder my-turn';
      } else {
        reminder.innerText = currentPlayer === 1 ? '⚫ 对方回合 — 请等待' : '⚪ 对方回合 — 请等待';
        reminder.className = 'turn-reminder opponent-turn';
      }
    }
  }

  function updateGameInfoPanel() {
    let blackM = lobbySeats.black ? (allMembers.get(lobbySeats.black)?.name || '棋手') : '空位';
    let whiteM = lobbySeats.white ? (allMembers.get(lobbySeats.white)?.name || '棋手') : '空位';
    document.getElementById('blackPlayerName').innerText = blackM;
    document.getElementById('whitePlayerName').innerText = whiteM;
    let role = mySeat === 'black' ? '黑棋' : (mySeat === 'white' ? '白棋' : '观战');
    document.getElementById('myRoleDisplay').innerText = role;
    document.getElementById('gameStatus').innerText = gameStarted ? (gameOver ? '终局' : '对弈中') : '未开始';
    let modeText = isProMode ? '专业模式（禁手规则）' : '业余模式（自由对弈）';
    document.getElementById('gameModeDisplay').innerText = modeText;
  }

  function updateGameButtons() {
    let btnSur = document.getElementById('btnSurrender');
    let btnDraw = document.getElementById('btnDraw');
    let canUse = (mySeat === 'black' || mySeat === 'white') && gameStarted && !gameOver;
    if (btnSur) {
      btnSur.disabled = !canUse;
      btnSur.style.opacity = canUse ? '1' : '0.5';
    }
    if (btnDraw) {
      btnDraw.disabled = !canUse;
      btnDraw.style.opacity = canUse ? '1' : '0.5';
    }
  }

  // ==================== 心跳与清理 ====================
  function startHeartbeat() {
    if (heartbeatTimer) clearInterval(heartbeatTimer);
    heartbeatTimer = setInterval(async () => {
      if (!roomCode) return;
      await supabaseClient.from('room_players')
        .update({ last_seen: new Date().toISOString(), is_online: true })
        .eq('room_code', roomCode)
        .eq('user_id', myUserId);
    }, 15000);
  }

  window.addEventListener('beforeunload', async () => {
    if (roomCode) {
      let iAmHost = currentRoom && currentRoom.host_id === myUserId;
      if (iAmHost) {
        await supabaseClient.from('room_players').delete().eq('room_code', roomCode);
        await supabaseClient.from('rooms').delete().eq('room_code', roomCode);
        await supabaseClient.from('messages').delete().eq('room_code', roomCode);
      } else {
        await supabaseClient.from('room_players').delete()
          .eq('room_code', roomCode)
          .eq('user_id', myUserId);
      }
      localStorage.removeItem('gobang_current_room');
    }
  });

  // ==================== 断线重连 ====================
  async function tryReconnect() {
    // 检测登录状态
    const { data: { session } } = await supabaseClient.auth.getSession();
    if (session) {
      currentUser = session.user;
      console.log('联机版已登录用户:', currentUser.id);
    }

    let savedRoom = localStorage.getItem('gobang_current_room');
    if (!savedRoom) return;

    const { data: room } = await supabaseClient
      .from('rooms')
      .select('*')
      .eq('room_code', savedRoom)
      .single();

    if (room && room.status !== 'closed') {
      roomCode = savedRoom;
      roomGameMode = room.mode || 'casual';
      isProMode = roomGameMode === 'pro';
      currentRoom = room;
      isHost = room.host_id === myUserId;

      await supabaseClient.from('room_players').upsert({
        room_code: roomCode,
        user_id: myUserId,
        nickname: myNick,
        is_online: true,
        last_seen: new Date().toISOString()
      }, { onConflict: 'room_code,user_id' });

      document.getElementById('roomCodeDisplay').innerText = roomCode;
      document.getElementById('gameRoomCode').innerText = roomCode;

      setupSubscription();
      await handlePlayersUpdate();

      if (room.game_started) {
        gameStarted = true;
        if (room.board_state) board = room.board_state;
        currentPlayer = room.current_player;
        moveHistory = room.move_history || [];
        gameOver = room.game_over;
        winner = room.winner;
        winLines = room.win_lines || [];
        forbiddenLines = room.forbidden_lines || [];

        document.getElementById('entryScreen').classList.add('hidden');
        document.getElementById('lobbyScreen').classList.add('hidden');
        document.getElementById('gameScreen').classList.remove('hidden');
        drawBoard();
        updateGameInfoPanel();
        updateTurnDisplay();
        updateGameButtons();
        if (gameOver) showWinnerMsg(room.end_reason);
      } else {
        document.getElementById('entryScreen').classList.add('hidden');
        document.getElementById('lobbyScreen').classList.remove('hidden');
        renderSpectators();
        updateLobbyUI();
      }
      lockNicknameDisplay();
      startHeartbeat();
      showToast('已恢复连接');
    } else {
      localStorage.removeItem('gobang_current_room');
    }
  }

  // ==================== 事件绑定 ====================
  document.getElementById('createRoomBtn').onclick = () => {
    if (!validateNickname()) return;
    createRoom();
  };
  document.getElementById('showJoinBtn').onclick = () => {
    let panel = document.getElementById('joinRoomPanel');
    panel.style.display = panel.style.display === 'none' ? 'flex' : 'none';
  };
  document.getElementById('confirmJoinBtn').onclick = () => {
    if (!validateNickname()) return;
    let code = document.getElementById('joinRoomCodeInput').value.trim().toUpperCase();
    if (code) joinRoom(code);
    else showToast('输入房间码');
  };

  canvas.addEventListener('click', (e) => {
    if (!gameStarted || gameOver) return;
    let rect = canvas.getBoundingClientRect();
    let scale = canvas.width / rect.width;
    let mx = (e.clientX - rect.left) * scale;
    let myY = (e.clientY - rect.top) * scale;
    let col = Math.round((mx - MARGIN) / CELL_SIZE);
    let row = Math.round((myY - MARGIN) / CELL_SIZE);
    if (row >= 0 && row < BOARD_SIZE && col >= 0 && col < BOARD_SIZE && board[row][col] === 0) {
      tryPlace(row, col);
    }
  });

  window.addEventListener('resize', () => {
    if (!document.getElementById('gameScreen').classList.contains('hidden')) drawBoard();
  });

  // ==================== 初始化 ====================
  updateEntryDisplay();
  renderSpectators();
  // 初始化登录状态
  (async () => {
    const { data: { session } } = await supabaseClient.auth.getSession();
    if (session) currentUser = session.user;
  })();

  tryReconnect();
  showToast('欢迎！请创建或加入房间');
</script>
</body>
</html>
