<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>东南五子 · 人机对弈</title>
  <link rel="stylesheet" href="style.css">
  <script src="goban.js"></script>
  <script src="rules.js"></script>
  <script src="ai.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.49.4/dist/umd/supabase.min.js"></script>
  <script src="audio.js"></script>
  <link rel="stylesheet" href="music-player.css">
  <script src="music-player.js"></script>
  <style>
    #gameScreen { padding-top: 80px; }
    .board-wrap { max-width: 820px; }
    .turn-reminder { font-size: 2.0rem; padding: 12px 24px; }

    .top-bar {
      position: fixed; top: 0; left: 0; right: 0; height: 60px;
      background: rgba(25, 18, 10, 0.85);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid rgba(230, 190, 110, 0.3);
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 16px; z-index: 100;
    }
    .logo {
      font-family: 'Orbitron', monospace;
      font-size: 1.2rem; font-weight: 700; color: #e9bc6e;
      letter-spacing: 2px;
      white-space: nowrap;
    }
    .top-right {
      display: flex; gap: 8px; align-items: center;
    }
    .top-btn {
      background: rgba(200, 160, 100, 0.2);
      border: 1px solid #e9bc6e;
      border-radius: 40px;
      padding: 4px 12px;
      cursor: pointer;
      font-size: 0.8rem;
      color: #ecd9b4;
      transition: 0.2s;
      white-space: nowrap;
    }
    .top-btn:hover {
      background: rgba(200, 160, 100, 0.35);
    }

    @media (max-width: 768px) {
      .top-bar { height: 50px; padding: 0 10px; }
      .logo { font-size: 0.9rem; letter-spacing: 1px; }
      .top-btn { padding: 3px 8px; font-size: 0.7rem; }
      #setupScreen { padding-top: 70px; }
      #gameScreen { padding-top: 70px; }
    }

    #setupScreen {
      padding-top: 80px;
      min-height: 100vh;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 20px; padding: 80px 20px 40px;
    }
  </style>
</head>
<body>

<div id="toast" class="toast"></div>

<div id="setupScreen">
  <div class="top-bar">
    <div class="logo">⚫ 东南五子·人机对弈 ⚪</div>
    <div class="top-right">
      <button class="top-btn" onclick="window.goToHall()">🏠 大厅</button>
    </div>
  </div>

  <div class="setup-title">⚫ 东南五子 · 人机对弈 ⚪</div>
  <div class="setup-section">
    <div class="setup-section-title">🎯 选择执子颜色</div>
    <div class="color-choice">
      <div class="color-card black selected" onclick="selectColor(1)" id="cardBlack">
        <div class="stone-icon"></div>
        <div>执黑先行</div>
      </div>
      <div class="color-card white" onclick="selectColor(2)" id="cardWhite">
        <div class="stone-icon"></div>
        <div>执白后行</div>
      </div>
    </div>
  </div>
  <div class="setup-section">
    <div class="ai-info" id="aiInfoBox">
      <div class="ai-title">🔥 传说级 AI · 深度 4</div>
      <div class="ai-desc">Minimax + Alpha-Beta + VCT 威胁搜索 | 16 个候选点</div>
    </div>
    <div class="ai-learn-info" id="aiLearnInfo">
      🤖 AI 学习系统：每局结束后分析你的下棋风格，后续对局针对性调整策略
      <div class="learn-stat" id="learnStat">已记录对局：0 局 | AI 学习进度：0%</div>
    </div>
  </div>
  <button class="start-btn" onclick="startGame()" id="startBtn">🎮 开始对战</button>
</div>

<div id="gameScreen" class="hidden">
  <div class="top-bar">
    <div class="logo">⚫ 东南五子·人机对弈 ⚪</div>
    <div class="top-right">
      <button class="top-btn" onclick="backToMenu()">🔙 返回</button>
      <button class="top-btn" onclick="window.goToHall()">🏠 大厅</button>
    </div>
  </div>
  <div class="game-container-ai">
    <div class="board-panel">
      <div class="board-wrap">
        <div id="turnReminder" class="turn-reminder my-turn">⚫ 你的回合 — 请落子</div>
        <canvas id="gobanCanvas" width="800" height="800"></canvas>
      </div>
    </div>
    <div class="side-panel">
      <div class="game-info">
        <div>🎮 模式<span class="mode-badge" id="modeBadge">业余模式</span><span class="ai-level-badge" id="aiLevelBadge">AI: 传说级</span></div>
        <div class="mini-players">
          <div class="mini-card active-black" id="miniBlack"><div>⚫ 玩家</div><div id="nameBlack">你</div></div>
          <div class="mini-card" id="miniWhite"><div>⚪ AI</div><div id="nameWhite">东南棋灵</div></div>
        </div>
        <div class="turn-indicator-ai" id="turnIndicator">⚫ 黑棋回合</div>
        <div id="winnerMessage"></div>
      </div>
      <div class="ai-status" id="aiStatus">AI 状态：待机</div>
      <div class="action-area">
        <button class="game-btn" id="btnUndo" onclick="undoMove()" disabled>↩️ 悔棋</button>
        <button class="game-btn secondary" onclick="restartGame()">🔄 重新开始</button>
        <button class="game-btn secondary" onclick="backToMenu()">📋 返回菜单</button>
      </div>
    </div>
  </div>
</div>

<div id="gameEndOverlay" class="game-end-overlay" onclick="closeOverlay()">
  <div class="end-particles" id="endParticles"></div>
  <div class="game-end-text" id="gameEndText">⚫ 黑方获胜！</div>
  <div class="game-end-sub" id="gameEndSub">黑棋连珠，技高一筹</div>
</div>

<script>
  window.goToHall = function() {
    window.location.href = 'index.html';
  };

  initAudio();

  // ===================== Supabase 战绩配置 =====================
  const SUPABASE_URL = 'https://txgemtxikpieaqcohglr.supabase.co';
  const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InR4Z2VtdHhpa3BpZWFxY29oZ2xyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk4MDY1NTIsImV4cCI6MjA5NTM4MjU1Mn0.I0PHUfWmiDpBnfjmTBJ1u6ybzZzhsTG0uaLbKBrcN1c';
  let supabaseClient = null;
  let currentUser = null;
  let myGuestId = null;
  let gameSaved = false;

  async function initSupabase() {
    if (!window.supabase) {
      console.error('❌ Supabase 库未加载');
      return;
    }
    supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
    const { data: { session } } = await supabaseClient.auth.getSession();
    if (session) {
      currentUser = session.user;
      console.log('✅ 已登录用户:', currentUser.id);
    } else {
      myGuestId = localStorage.getItem('guest_id');
      if (!myGuestId) {
        myGuestId = 'guest_' + Date.now() + '_' + Math.random().toString(36).substr(2, 6);
        localStorage.setItem('guest_id', myGuestId);
      }
      console.log('✅ 游客 ID:', myGuestId);
    }
    supabaseClient.auth.onAuthStateChange((event, session) => {
      if (event === 'SIGNED_IN' && session) {
        currentUser = session.user;
        myGuestId = null;
        console.log('✅ 登录状态变化: 已登录', currentUser.id);
      } else if (event === 'SIGNED_OUT') {
        currentUser = null;
        myGuestId = localStorage.getItem('guest_id');
        if (!myGuestId) {
          myGuestId = 'guest_' + Date.now() + '_' + Math.random().toString(36).substr(2, 6);
          localStorage.setItem('guest_id', myGuestId);
        }
        console.log('✅ 登录状态变化: 已退出，游客 ID:', myGuestId);
      }
    });
  }

  async function saveGameToSupabase() {
    console.log('📊 尝试保存战绩...');
    if (gameSaved) {
      console.log('⏭️ 已保存过，跳过');
      return;
    }
    if (!supabaseClient) {
      console.warn('⚠️ Supabase 客户端未初始化，尝试重新初始化...');
      await initSupabase();
      if (!supabaseClient) {
        console.error('❌ Supabase 客户端仍为 null，放弃保存');
        return;
      }
    }
    if (moveHistory.length === 0) {
      console.warn('⚠️ 没有落子记录，跳过保存');
      return;
    }
    if (!gameOver) {
      console.warn('⚠️ 游戏未结束，跳过保存');
      return;
    }

    const moves = moveHistory.map((m, i) => ({
      step: i + 1,
      row: m.row,
      col: m.col,
      player: m.player
    }));

    let winnerText = 'draw';
    if (winner === 1) winnerText = 'black';
    else if (winner === 2) winnerText = 'white';
    else if (winner === 'forbidden') winnerText = 'forbidden';

    if (forbiddenLines && forbiddenLines.length > 0 && winner === 2) {
      winnerText = 'forbidden';
    }

    const blackName = playerIsBlack ? playerName : '东南棋灵';
    const whiteName = playerIsBlack ? '东南棋灵' : playerName;

    const uid = currentUser ? currentUser.id : null;
    const gid = currentUser ? null : myGuestId;

    console.log('📤 准备插入数据:', {
      user_id: uid,
      guest_id: gid,
      room_id: 'ai_' + Date.now(),
      black_player: blackName,
      white_player: whiteName,
      winner: winnerText,
      game_mode: isProMode ? 'pro' : 'casual',
      moves: moves
    });

    try {
      const { data, error } = await supabaseClient.from('games').insert({
        user_id: uid,
        guest_id: gid,
        room_id: 'ai_' + Date.now(),
        black_player: blackName,
        white_player: whiteName,
        winner: winnerText,
        game_mode: isProMode ? 'pro' : 'casual',
        moves: moves
      });
      if (error) {
        console.error('❌ 插入失败:', error);
      } else {
        gameSaved = true;
        console.log('✅ 战绩已保存成功！', data);
        const threeDaysAgo = new Date(Date.now() - 3 * 24 * 60 * 60 * 1000).toISOString();
        let delQuery = supabaseClient.from('games').delete().lt('created_at', threeDaysAgo);
        if (currentUser) delQuery = delQuery.eq('user_id', currentUser.id);
        else if (myGuestId) delQuery = delQuery.eq('guest_id', myGuestId);
        else return;
        await delQuery;
        console.log('🧹 清理旧记录完成');
      }
    } catch (e) {
      console.error('❌ 保存战绩异常:', e);
    }
  }

  // ===================== 配置 =====================
  const urlParams = new URLSearchParams(window.location.search);
  let gameMode = urlParams.get('mode') || 'casual';
  let isProMode = gameMode === 'pro';
  let playerName = urlParams.get('nickname') || localStorage.getItem('gonick') || '玩家';

  let selectedPlayerColor = 1;
  let playerIsBlack = true;

  const BOARD_SIZE = 15;
  const CANVAS_SIZE = 800;
  const MARGIN = 50;
  const GRID_SIZE = CANVAS_SIZE - MARGIN * 2;
  const CELL_SIZE = GRID_SIZE / (BOARD_SIZE - 1);
  const stoneRadius = CELL_SIZE * 0.46;

  let canvas = document.getElementById('gobanCanvas');
  let ctx = canvas.getContext('2d');

  let board = [];
  let currentPlayer = 1;
  let gameOver = false;
  let winner = null;
  let moveHistory = [];
  let winLines = [];
  let forbiddenLines = [];
  let aiThinking = false;

  // ===================== AI 学习系统 =====================
  const LEARN_KEY = 'gomoku_ai_learn';
  let aiLearnData = {
    gamesPlayed: 0,
    playerPatterns: {},
    playerOpenings: [],
    playerAggressive: 0,
    playerDefensive: 0,
    winRate: 0,
    lastMoves: []
  };

  function loadLearnData() {
    try {
      let saved = localStorage.getItem(LEARN_KEY);
      if (saved) aiLearnData = JSON.parse(saved);
    } catch (e) {}
  }

  function saveLearnData() {
    localStorage.setItem(LEARN_KEY, JSON.stringify(aiLearnData));
  }

  function analyzeGame() {
    aiLearnData.gamesPlayed++;
    if (moveHistory.length > 0) {
      let firstMove = moveHistory[0];
      let key = `${firstMove.row},${firstMove.col}`;
      aiLearnData.playerOpenings.push(key);
      if (aiLearnData.playerOpenings.length > 20) aiLearnData.playerOpenings.shift();
    }
    let attackCount = 0, defenseCount = 0;
    let playerNum = playerIsBlack ? 1 : 2;
    for (let m of moveHistory) {
      if (m.player !== playerNum) continue;
      let dist = Math.abs(m.row - 7) + Math.abs(m.col - 7);
      if (dist <= 4) attackCount++;
      else defenseCount++;
    }
    let total = attackCount + defenseCount;
    if (total > 0) {
      aiLearnData.playerAggressive = aiLearnData.playerAggressive * 0.7 + (attackCount / total) * 0.3;
      aiLearnData.playerDefensive = aiLearnData.playerDefensive * 0.7 + (defenseCount / total) * 0.3;
    }
    let playerMoves = moveHistory.filter(m => m.player === playerNum).slice(-10);
    aiLearnData.lastMoves = playerMoves.map(m => `${m.row},${m.col}`);
    if (winner === (playerIsBlack ? 2 : 1)) {
      aiLearnData.winRate = aiLearnData.winRate * 0.9 + 0.1;
    } else if (winner === (playerIsBlack ? 1 : 2)) {
      aiLearnData.winRate = aiLearnData.winRate * 0.9;
    }
    saveLearnData();
  }

  function applyLearningScore(baseScore, row, col) {
    if (aiLearnData.gamesPlayed < 2) return baseScore;
    let adjusted = baseScore;
    for (let opening of aiLearnData.playerOpenings.slice(-5)) {
      let [or, oc] = opening.split(',').map(Number);
      let dist = Math.abs(row - or) + Math.abs(col - oc);
      if (dist <= 2) adjusted += 200 * (3 - dist);
    }
    if (aiLearnData.playerAggressive > 0.6) {
      for (let lastMove of aiLearnData.lastMoves.slice(-3)) {
        let [lr, lc] = lastMove.split(',').map(Number);
        let dist = Math.abs(row - lr) + Math.abs(col - lc);
        if (dist <= 3) adjusted += 150 * (4 - dist);
      }
    }
    if (aiLearnData.winRate < 0.3) adjusted += 100;
    let posKey = `${row},${col}`;
    if (aiLearnData.playerPatterns[posKey]) adjusted += aiLearnData.playerPatterns[posKey] * 50;
    return adjusted;
  }

  function recordPlayerPattern(row, col) {
    let key = `${row},${col}`;
    aiLearnData.playerPatterns[key] = (aiLearnData.playerPatterns[key] || 0) + 1;
    if (Object.keys(aiLearnData.playerPatterns).length > 100) {
      let entries = Object.entries(aiLearnData.playerPatterns);
      entries.sort((a, b) => b[1] - a[1]);
      aiLearnData.playerPatterns = Object.fromEntries(entries.slice(0, 50));
    }
  }

  // ===================== 界面操作 =====================
  function selectColor(color) {
    selectedPlayerColor = color;
    document.getElementById('cardBlack').classList.toggle('selected', color === 1);
    document.getElementById('cardWhite').classList.toggle('selected', color === 2);
  }

  function startGame() {
    // 已删除 playBgMusic()
    playerIsBlack = selectedPlayerColor === 1;
    document.getElementById('setupScreen').classList.add('hidden');
    document.getElementById('gameScreen').classList.remove('hidden');

    let nb = document.getElementById('nameBlack');
    let nw = document.getElementById('nameWhite');
    if (playerIsBlack) { nb.innerText = playerName;
      nw.innerText = '东南棋灵'; } else { nb.innerText = '东南棋灵';
      nw.innerText = playerName; }

    initGame();
  }

  function initGame() {
    gameSaved = false;
    board = Rules.initBoard(BOARD_SIZE);
    currentPlayer = 1;
    gameOver = false;
    winner = null;
    moveHistory = [];
    winLines = [];
    forbiddenLines = [];
    aiThinking = false;

    document.getElementById('modeBadge').innerText = isProMode ? '专业模式（禁手）' : '业余模式';
    document.getElementById('winnerMessage').innerText = '';
    document.getElementById('btnUndo').disabled = true;
    updateTurnDisplay();
    drawBoard();

    if (!playerIsBlack) {
      setTimeout(() => aiMove(), 300);
    }
  }

  // ===================== 绘制 =====================
  function drawBoard(drawLastMark) {
    if (drawLastMark === undefined) drawLastMark = !isProMode;
    const lastMove = moveHistory.length > 0 ? moveHistory[moveHistory.length - 1] : null;
    Goban.drawBoard(ctx, board, {
      lastMove: lastMove,
      winLines: winLines,
      forbiddenLines: forbiddenLines,
      drawLastMark: drawLastMark,
      boardSize: BOARD_SIZE,
      margin: MARGIN,
      stoneRadius: stoneRadius
    });
  }

  function animateLines(lines, isForbidden, onComplete) {
    let startTime = null, duration = 800;
    function frame(timestamp) {
      if (!startTime) startTime = timestamp;
      let elapsed = timestamp - startTime;
      let progress = Math.min(elapsed / duration, 1);
      let ease = 1 - Math.pow(1 - progress, 3);
      drawBoard(false);
      if (lines.length > 0) {
        Goban.drawLinesProgress(ctx, lines, ease, MARGIN, CELL_SIZE, '#d64531');
      }
      if (progress < 1) requestAnimationFrame(frame);
      else setTimeout(onComplete, 300);
    }
    requestAnimationFrame(frame);
  }

  // ===================== 游戏逻辑 =====================
  function playerMove(row, col) {
    if (gameOver || aiThinking || board[row][col] !== 0) return false;
    let playerNum = playerIsBlack ? 1 : 2;
    if (currentPlayer !== playerNum) { showToast('请等待AI落子'); return false; }

    if (isProMode && playerNum === 1) {
      board[row][col] = 1;
      let forbidden = Rules.checkForbidden(row, col, board, BOARD_SIZE);
      board[row][col] = 0;
      if (forbidden.sanSan || forbidden.siSi || forbidden.overline) {
        board[row][col] = 1;
        moveHistory.push({ row, col, player: 1 });
        forbiddenLines = forbidden.lines;
        drawBoard(false);
        endGame(2, 'forbidden');
        return true;
      }
    }

    board[row][col] = playerNum;
    moveHistory.push({ row, col, player: playerNum });
    recordPlayerPattern(row, col);
    document.getElementById('btnUndo').disabled = false;

    let winLine = Rules.checkWinWithLine(row, col, playerNum, board, BOARD_SIZE);
    if (winLine) { winLines = [winLine];
      endGame(playerNum); return true; }
    if (Rules.isBoardFull(board, BOARD_SIZE)) { endGame(0); return true; }

    currentPlayer = playerIsBlack ? 2 : 1;
    drawBoard();
    updateTurnDisplay();
    aiMove();
    return true;
  }

  function aiMove() {
    if (gameOver) return;
    aiThinking = true;
    document.getElementById('aiStatus').innerHTML = '<span class="ai-thinking">🤖 AI 思考中...</span>';
    updateTurnDisplay();

    setTimeout(() => {
      let t0 = performance.now();
      let move = GomokuAI.getMove(board, moveHistory, isProMode, playerIsBlack, applyLearningScore);
      let t1 = performance.now();

      let aiPlayer = playerIsBlack ? 2 : 1;

      if (isProMode && aiPlayer === 1) {
        board[move.r][move.c] = 1;
        let forbidden = Rules.checkForbidden(move.r, move.c, board, BOARD_SIZE);
        board[move.r][move.c] = 0;
        if (forbidden.sanSan || forbidden.siSi || forbidden.overline) {
          board[move.r][move.c] = 1;
          moveHistory.push({ row: move.r, col: move.c, player: 1 });
          forbiddenLines = forbidden.lines;
          drawBoard(false);
          endGame(2, 'forbidden');
          aiThinking = false;
          return;
        }
      }

      board[move.r][move.c] = aiPlayer;
      moveHistory.push({ row: move.r, col: move.c, player: aiPlayer });

      let aiWinLine = Rules.checkWinWithLine(move.r, move.c, aiPlayer, board, BOARD_SIZE);
      if (aiWinLine) { winLines = [aiWinLine];
        endGame(aiPlayer); } else if (Rules.isBoardFull(board, BOARD_SIZE)) { endGame(0); } else {
        currentPlayer = playerIsBlack ? 1 : 2;
        drawBoard();
        updateTurnDisplay();
      }

      aiThinking = false;
      let elapsed = ((t1 - t0) / 1000).toFixed(2);
      document.getElementById('aiStatus').innerText = 'AI 思考耗时 ' + elapsed + 's';
    }, 30);
  }

  // ===================== 游戏结束 =====================
  function endGame(winningPlayer, reason) {
    gameOver = true;
    winner = winningPlayer;
    updateTurnDisplay();
    analyzeGame();

    if (reason === 'forbidden') {
      document.getElementById('winnerMessage').innerText = '⛔ 黑棋禁手！白棋胜';
      drawBoard(false);
      animateLines(forbiddenLines, true, () => showWinnerMsg('forbidden'));
      saveGameToSupabase();
      return;
    }
    if (winner === 1) document.getElementById('winnerMessage').innerText = '🏆 黑棋五连！胜局 🏆';
    else if (winner === 2) document.getElementById('winnerMessage').innerText = '🏆 白棋五连！胜局 🏆';
    else document.getElementById('winnerMessage').innerText = '🤝 棋盘已满 · 平局 🤝';

    if (winLines.length > 0) {
      drawBoard(false);
      animateLines(winLines, false, () => showWinnerMsg());
    } else showWinnerMsg();

    saveGameToSupabase();
  }

  function showWinnerMsg(type) {
    let msg, subMsg, className;
    let playerWon = (winner === (playerIsBlack ? 1 : 2));
    let aiWon = (winner === (playerIsBlack ? 2 : 1));

    if (type === 'forbidden') {
      msg = '⛔ 黑棋禁手！';
      subMsg = '白棋不战而胜';
      className = 'end-forbidden';
    } else if (winner === 1) {
      if (playerIsBlack && playerWon) { msg = '⚫ 你获胜了！';
        subMsg = '棋高一着，AI甘拜下风';
        className = 'end-black-win'; } else { msg = '⚫ AI获胜！';
        subMsg = '东南棋灵，技高一筹';
        className = 'end-black-win'; }
    } else if (winner === 2) {
      if (!playerIsBlack && playerWon) { msg = '⚪ 你获胜了！';
        subMsg = '棋高一着，AI甘拜下风';
        className = 'end-white-win'; } else { msg = '⚪ AI获胜！';
        subMsg = '东南棋灵，技高一筹';
        className = 'end-white-win'; }
    } else {
      msg = '🤝 平局！';
      subMsg = '旗鼓相当，不分胜负';
      className = 'end-draw';
    }

    let overlay = document.getElementById('gameEndOverlay');
    let text = document.getElementById('gameEndText');
    let sub = document.getElementById('gameEndSub');
    let particles = document.getElementById('endParticles');

    text.innerText = msg;
    text.className = 'game-end-text ' + className;
    sub.innerText = subMsg;
    particles.innerHTML = '';
    for (let i = 0; i < 20; i++) {
      let p = document.createElement('div');
      p.className = 'end-particle';
      p.style.left = Math.random() * 100 + '%';
      p.style.top = Math.random() * 100 + '%';
      p.style.animationDelay = Math.random() * 2 + 's';
      p.style.width = (3 + Math.random() * 6) + 'px';
      p.style.height = p.style.width;
      let colors = ['#e9bc6e', '#f5c542', '#e0816b', '#6c9fd1', '#c8aa77'];
      p.style.background = colors[Math.floor(Math.random() * colors.length)];
      particles.appendChild(p);
    }
    overlay.classList.add('show');
  }

  function closeOverlay() {
    document.getElementById('gameEndOverlay').classList.remove('show');
  }

  // ===================== 其它操作 =====================
  function undoMove() {
    if (gameOver || moveHistory.length === 0 || aiThinking) return;
    let playerNum = playerIsBlack ? 1 : 2;
    let aiNum = playerIsBlack ? 2 : 1;

    if (moveHistory.length >= 2) {
      let last = moveHistory[moveHistory.length - 1];
      if (last.player === aiNum) { board[last.row][last.col] = 0;
        moveHistory.pop(); }
    }
    if (moveHistory.length > 0) {
      let last = moveHistory[moveHistory.length - 1];
      if (last.player === playerNum) { board[last.row][last.col] = 0;
        moveHistory.pop(); }
    }
    currentPlayer = playerNum;
    gameOver = false;
    winner = null;
    winLines = [];
    forbiddenLines = [];
    document.getElementById('winnerMessage').innerText = '';
    if (moveHistory.length === 0) document.getElementById('btnUndo').disabled = true;
    drawBoard();
    updateTurnDisplay();
    showToast('已悔棋');
  }

  function restartGame() {
    if (aiThinking) return;
    if (!gameOver && moveHistory.length > 0) { if (!confirm('确定要重新开始吗？')) return; }
    initGame();
    showToast('新的一局开始了！');
  }

  function backToMenu() {
    if (!gameOver && moveHistory.length > 0) { if (!confirm('确定要返回菜单吗？')) return; }
    document.getElementById('gameScreen').classList.add('hidden');
    document.getElementById('setupScreen').classList.remove('hidden');
    closeOverlay();
  }

  function updateTurnDisplay() {
    let turnText, reminderClass;
    let miniBlack = document.getElementById('miniBlack');
    let miniWhite = document.getElementById('miniWhite');
    miniBlack.classList.remove('active-black');
    miniWhite.classList.remove('active-white');

    let playerNum = playerIsBlack ? 1 : 2;

    if (gameOver) {
      turnText = winner === 0 ? '🤝 平局结束' : (winner === playerNum ? (playerIsBlack ? '⚫ 你获胜了' : '⚪ 你获胜了') : (playerIsBlack ? '⚪ AI获胜' : '⚫ AI获胜'));
      reminderClass = 'game-over';
      if (winner === 1) miniBlack.classList.add('active-black');
      else if (winner === 2) miniWhite.classList.add('active-white');
    } else if (currentPlayer === playerNum) {
      turnText = playerIsBlack ? '⚫ 你的回合 — 请落子' : '⚪ 你的回合 — 请落子';
      reminderClass = 'my-turn';
      if (playerIsBlack) miniBlack.classList.add('active-black');
      else miniWhite.classList.add('active-white');
    } else {
      turnText = playerIsBlack ? '⚪ AI思考中 — 请等待' : '⚫ AI思考中 — 请等待';
      reminderClass = 'ai-turn';
      if (playerIsBlack) miniWhite.classList.add('active-white');
      else miniBlack.classList.add('active-black');
    }

    document.getElementById('turnIndicator').innerText = turnText;
    let reminder = document.getElementById('turnReminder');
    reminder.innerText = turnText;
    reminder.className = 'turn-reminder ' + reminderClass;
  }

  function showToast(msg) {
    let t = document.getElementById('toast');
    t.innerText = msg;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 2500);
  }

  // ===================== 事件绑定 =====================
  canvas.addEventListener('click', (e) => {
    if (gameOver || aiThinking) return;
    let rect = canvas.getBoundingClientRect();
    let scale = canvas.width / rect.width;
    let mx = (e.clientX - rect.left) * scale;
    let myY = (e.clientY - rect.top) * scale;
    let col = Math.round((mx - MARGIN) / CELL_SIZE);
    let row = Math.round((myY - MARGIN) / CELL_SIZE);
    if (row >= 0 && row < BOARD_SIZE && col >= 0 && col < BOARD_SIZE) playerMove(row, col);
  });

  window.addEventListener('resize', () => drawBoard());

  // ===================== 启动 =====================
  loadLearnData();
  initSupabase();
  console.log('🚀 AI 对战已启动，战绩保存功能已就绪');
</script>
</body>
</html>
